<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Artifacts — Viewer</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg?v=2">
    <meta name="theme-color" content="#1a1a1a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; frame-src blob:; base-uri 'self'; form-action 'self';">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #1a1a1a;
            --fg:           #ffffff;
            --muted:        #888888;
            --border:       #ffffff;
            --border-dim:   #444444;
            --pane-bg:      #111111;
            --danger:       #cc3333;
            --added-fg:     #bbf7d0;
            --bw:           1px;
            --mono:         'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            --sans:         system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--mono);
            font-size: 0.75rem;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Scrollbar ───────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        /* ── Buttons ─────────────────────────────────────────────────── */
        .btn {
            background: var(--bg);
            color: var(--fg);
            border: var(--bw) solid var(--border);
            padding: 0.25rem 0.6rem;
            font-family: var(--mono);
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 2px 2px 0 var(--border);
            outline: none;
        }
        .btn:hover {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--border);
            background: var(--fg);
            color: var(--bg);
        }
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        .btn:focus-visible {
            outline: 2px dashed var(--fg);
            outline-offset: 2px;
        }
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 2px 2px 0 var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger);
            color: var(--fg);
            box-shadow: 1px 1px 0 var(--danger);
        }
        .btn-active {
            background: var(--fg);
            color: var(--bg);
        }
        .btn-group {
            display: inline-flex;
            border: var(--bw) solid var(--border);
            box-shadow: 2px 2px 0 var(--border);
        }
        .btn-group .btn {
            box-shadow: none;
            border: none;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
        }
        .btn-group .btn:not(:last-child) {
            border-right: var(--bw) solid var(--border);
        }

        /* ── Inputs ──────────────────────────────────────────────────── */
        input, select, textarea {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--fg);
            border: var(--bw) solid var(--border-dim);
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--border);
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        header {
            border-bottom: var(--bw) solid var(--border);
            padding: 0.6rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--bg);
            z-index: 20;
        }
        .header-title {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        /* ── Main Layout ─────────────────────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Icon Rail ─────────────────────────────────────────────── */
        #icon-rail {
            width: 48px;
            border-right: var(--bw) solid var(--border-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 0;
            gap: 0.5rem;
            flex-shrink: 0;
            background: var(--bg);
            z-index: 30;
        }
        .rail-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--muted);
            border: var(--bw) solid transparent;
            cursor: pointer;
            transition: all 0.1s ease;
            padding: 0;
        }
        .rail-btn:hover {
            color: var(--fg);
            border-color: var(--border-dim);
        }
        .rail-btn.active {
            background: var(--pane-bg);
            color: var(--fg);
            border-color: var(--border);
        }

        /* ── Sidebar ─────────────────────────────────────────────────── */
        #sidebar {
            background: var(--bg);
            border-right: var(--bw) solid var(--border-dim);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 20;
            width: 0;
            transition: width 0.25s ease-out;
            will-change: width;
        }
        .sidebar-inner {
            width: 256px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 256px;
        }
        .sidebar-header {
            padding: 0.6rem 0.75rem;
            border-bottom: var(--bw) solid var(--border-dim);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.75rem;
            background: var(--bg);
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.1s ease;
            border: var(--bw) solid transparent;
        }
        .sidebar-item:hover {
            background: var(--pane-bg);
            border-color: var(--border-dim);
        }
        .sidebar-item.active {
            background: var(--pane-bg);
            border-color: var(--border);
        }
        .sidebar-item-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--fg);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .sidebar-item-meta {
            font-size: 0.65rem;
            color: var(--muted);
            margin-right: 0.5rem;
            text-transform: uppercase;
        }
        .sidebar-item-del {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 0.15rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.1s ease;
        }
        .sidebar-item-del:hover {
            color: var(--danger);
        }

        /* ── Preview Stage ───────────────────────────────────────────── */
        #preview-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
            background: var(--bg);
        }
        #pane-row {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* ── Preview Pane ────────────────────────────────────────────── */
        .preview-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg);
        }
        .preview-pane + .preview-pane {
            border-left: var(--bw) solid var(--border-dim);
        }
        .pane-header {
            border-bottom: var(--bw) solid var(--border-dim);
            padding: 0.35rem 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg);
            color: var(--muted);
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s ease, color 0.1s ease;
        }
        .pane-header:hover {
            color: var(--fg);
        }
        /* Subtle focus indicator: no inverted background, just a brighter
           strip and a filled tag so you can tell which pane is active. */
        .preview-pane.active .pane-header {
            color: var(--fg);
        }
        .preview-pane.active .pane-tag {
            background: var(--fg);
            color: var(--bg);
        }
        .pane-tag {
            font-size: 0.65rem;
            border: var(--bw) solid currentColor;
            padding: 0 0.3rem;
            line-height: 1.4;
            flex-shrink: 0;
        }
        .pane-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .pane-unsaved-dot {
            margin-left: auto;
            font-size: 0.65rem;
            font-weight: 900;
            opacity: 0;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }
        .pane-unsaved-dot.visible {
            opacity: 1;
        }
        .pane-body {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
            min-height: 0;
        }
        .frame-wrapper {
            width: 100%;
            height: 100%;
            background: var(--pane-bg);
            transition: width 0.3s ease;
            position: relative;
        }
        .frame-wrapper.preview-bg-filled {
            background: #ffffff;
        }
        .preview-frame {
            width: 100%;
            height: 100%;
            border: 0;
            position: relative;
            z-index: 10;
            background: transparent;
            /* Empty iframes must not block clicks on the pane body
               (click-to-browse). When filled, the frame is interactive. */
            pointer-events: none;
        }
        .frame-wrapper.preview-bg-filled .preview-frame {
            pointer-events: auto;
        }
        .preview-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            z-index: 0;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            padding: 1rem;
        }
        .preview-placeholder .placeholder-sub {
            font-size: 0.65rem;
            color: var(--border-dim);
            letter-spacing: 0.08em;
        }
        .preview-placeholder svg {
            opacity: 0.3;
        }

        /* ── Device Bar ──────────────────────────────────────────────── */
        .device-bar {
            border-top: var(--bw) solid var(--border-dim);
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            flex-shrink: 0;
            background: var(--bg);
        }
        .device-bar-label {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-right: 0.25rem;
        }
        .device-bar-sep {
            width: 1px;
            height: 1rem;
            background: var(--border-dim);
            margin: 0 0.25rem;
        }

        /* ── Drop Overlays ───────────────────────────────────────────── */
        .drop-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(17, 17, 17, 0.95);
            border: 2px dashed var(--border-dim);
            margin: 0.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease, border-color 0.15s ease;
        }
        body.dragging .drop-overlay {
            opacity: 1;
            /* During a drag the overlays sit on top of the iframes and
               become the actual drop targets (iframes would otherwise
               swallow the drop). */
            pointer-events: auto;
        }
        .preview-pane.hot .drop-overlay {
            border-color: var(--added-fg);
        }
        .preview-pane.hot .drop-overlay-text {
            color: var(--added-fg);
        }
        .drop-overlay-text {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            font-family: var(--mono);
            transition: color 0.15s ease;
        }

        /* ── Toast ───────────────────────────────────────────────────── */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg);
            border: var(--bw) solid var(--border);
            color: var(--fg);
            padding: 0.6rem 1.2rem;
            font-size: 0.75rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            text-transform: uppercase;
            box-shadow: 2px 2px 0 var(--border);
            font-family: var(--mono);
        }
        #toast.visible {
            opacity: 1;
        }

        /* ── Confirm Dialog ──────────────────────────────────────────── */
        #confirm-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 110;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #confirm-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #confirm-dialog {
            background: var(--bg);
            border: var(--bw) solid var(--border);
            padding: 1.5rem;
            width: 320px;
            box-shadow: 4px 4px 0 var(--border);
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }
        #confirm-overlay.active #confirm-dialog {
            transform: scale(1);
        }
        #confirm-message {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            color: var(--fg);
            font-family: var(--mono);
        }

        /* ── Fullscreen Modal ────────────────────────────────────────── */
        #fullscreen-modal {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 50;
            display: none;
            flex-direction: column;
        }
        #fullscreen-modal:not(.hidden) {
            display: flex;
        }
        .fullscreen-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .fullscreen-controls:hover {
            opacity: 1;
        }
        .fullscreen-hint {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            background: rgba(26, 26, 26, 0.9);
            padding: 0.25rem 0.5rem;
            border: var(--bw) solid var(--border-dim);
            font-family: var(--mono);
        }
        #fullscreen-frame {
            flex: 1;
            border: 0;
        }

        .hidden {
            display: none !important;
        }

        /* ── Empty States ────────────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            gap: 0.75rem;
        }
        .empty-state-icon {
            opacity: 0.3;
        }
        .empty-state-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: var(--mono);
        }
        .empty-state-sub {
            font-size: 0.65rem;
            color: var(--border-dim);
            text-transform: uppercase;
            font-family: var(--mono);
        }

        /* ── Narrow screens: stack panes vertically ──────────────────── */
        @media (max-width: 768px) {
            #pane-row.split {
                flex-direction: column;
            }
            #pane-row.split .preview-pane + .preview-pane {
                border-left: none;
                border-top: var(--bw) solid var(--border-dim);
            }
        }
    </style>
</head>
<body>

    <!-- Header — Artifact Toolbar -->
    <header>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <h1 class="header-title">Just Artifacts</h1>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="text" id="artifact-title" value="New_Artifact" style="width: 180px; background: transparent; border: var(--bw) solid var(--border-dim); padding: 0.25rem 0.5rem; font-size: 0.75rem; color: var(--fg); text-transform: uppercase; font-weight: bold;" />
                <span id="unsaved-indicator" style="font-size: 0.65rem; color: var(--fg); opacity: 0; transition: opacity 0.2s; font-weight: 900; white-space: nowrap; pointer-events: none;">● UNSAVED</span>
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <button id="save-btn" class="btn" title="Save active pane (Ctrl+S)">Save</button>
            <button id="new-artifact-btn" class="btn" title="Clear active pane (Ctrl+N)">
                <span style="display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New
                </span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>

        <!-- Icon Rail -->
        <nav id="icon-rail" aria-label="Sidebar navigation">
            <button id="rail-toggle-btn" class="rail-btn" title="Saved Artifacts (Ctrl+B)" aria-label="Toggle saved artifacts sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </nav>

        <!-- Sidebar Panel -->
        <aside id="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-header">
                    Saved Artifacts
                </div>
                <div id="saved-list" class="sidebar-list">
                    <!-- Saved items injected here -->
                </div>
            </div>
        </aside>

        <!-- Preview Stage -->
        <div id="preview-stage">
            <div id="pane-row">

                <!-- Pane A -->
                <section class="preview-pane active" id="pane-0">
                    <div class="pane-header" title="Click to focus this pane">
                        <span class="pane-tag">A</span>
                        <span class="pane-title">New_Artifact</span>
                        <span class="pane-unsaved-dot">● UNSAVED</span>
                    </div>
                    <div class="pane-body">
                        <div class="frame-wrapper">
                            <div class="preview-placeholder">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                <div>Drop an HTML file here</div>
                                <div class="placeholder-sub">or click to browse</div>
                            </div>
                            <iframe class="preview-frame" sandbox="allow-scripts allow-forms" referrerpolicy="no-referrer" title="Preview A"></iframe>
                            <div class="drop-overlay">
                                <div class="drop-overlay-text">Drop to load into A</div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Pane B -->
                <section class="preview-pane hidden" id="pane-1">
                    <div class="pane-header" title="Click to focus this pane">
                        <span class="pane-tag">B</span>
                        <span class="pane-title">New_Artifact</span>
                        <span class="pane-unsaved-dot">● UNSAVED</span>
                    </div>
                    <div class="pane-body">
                        <div class="frame-wrapper">
                            <div class="preview-placeholder">
                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="17 8 12 3 7 8"/>
                                    <line x1="12" y1="3" x2="12" y2="15"/>
                                </svg>
                                <div>Drop a second file to compare</div>
                                <div class="placeholder-sub">or click to browse</div>
                            </div>
                            <iframe class="preview-frame" sandbox="allow-scripts allow-forms" referrerpolicy="no-referrer" title="Preview B"></iframe>
                            <div class="drop-overlay">
                                <div class="drop-overlay-text">Drop to load into B</div>
                            </div>
                        </div>
                    </div>
                </section>

            </div>

            <!-- Device Presets Bar -->
            <div class="device-bar">
                <span class="device-bar-label">View:</span>
                <div class="btn-group">
                    <button id="view-single-btn" class="btn btn-active" title="Single page view">Single</button>
                    <button id="view-split-btn" class="btn" title="Side-by-side view">Split</button>
                </div>
                <div class="device-bar-sep"></div>
                <span class="device-bar-label">Viewport:</span>
                <button class="device-btn btn" data-width="375px">Mobile (375px)</button>
                <button class="device-btn btn" data-width="768px">Tablet (768px)</button>
                <button class="device-btn btn" data-width="1024px">Desktop (1024px)</button>
                <button class="device-btn btn btn-active" data-width="100%">Full Width</button>
                <div class="device-bar-sep"></div>
                <input type="number" id="custom-width" placeholder="Width (px)" style="width: 100px; font-size: 0.7rem; padding: 0.2rem 0.5rem;">
                <div class="device-bar-sep"></div>
                <button id="fullscreen-btn" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem;" title="Fullscreen active pane">Fullscreen</button>
            </div>
        </div>
    </main>

    <!-- Fullscreen Modal -->
    <div id="fullscreen-modal" class="hidden">
        <div class="fullscreen-controls">
            <span class="fullscreen-hint">Press ESC to exit</span>
            <button id="close-fullscreen-btn" class="btn" style="padding: 0.25rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <iframe id="fullscreen-frame" sandbox="allow-scripts allow-forms" referrerpolicy="no-referrer"></iframe>
    </div>

    <!-- Hidden file picker for click-to-browse -->
    <input type="file" id="file-input" accept=".html,.htm,.svg,.txt,text/html" class="hidden" />

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay">
        <div id="confirm-dialog">
            <p id="confirm-message"></p>
            <div style="display: flex; justify-content: flex-end; gap: 0.75rem;">
                <button id="confirm-cancel-btn" class="btn" style="border-color: var(--border-dim); color: var(--muted);">Cancel</button>
                <button id="confirm-ok-btn" class="btn btn-danger"><span id="confirm-ok-text">Delete</span></button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Constants & Configuration
         */
        const STORAGE_KEY = 'just-artifacts-v2-data';
        const DEFAULT_TITLE = 'New_Artifact';
        let fullscreenBlobUrl = null;

        /**
         * State Management
         *
         * Two panes (A=0, B=1). Each pane holds its own document:
         *   { artifactId: string|null, title: string, code: string }
         * Single view shows the ACTIVE pane full width; split shows both.
         */
        const state = {
            artifacts: [],
            viewMode: 'single', // 'single' | 'split'
            activePane: 0,
            panes: [
                { artifactId: null, title: DEFAULT_TITLE, code: '' },
                { artifactId: null, title: DEFAULT_TITLE, code: '' }
            ]
        };

        /**
         * LocalStorage Helpers
         */
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    state.artifacts = parsed.artifacts || [];
                    state.viewMode = parsed.viewMode === 'split' ? 'split' : 'single';
                    state.activePane = parsed.activePane === 1 ? 1 : 0;
                    if (Array.isArray(parsed.panes)) {
                        parsed.panes.slice(0, 2).forEach((p, i) => {
                            if (p && typeof p === 'object') {
                                state.panes[i] = {
                                    artifactId: p.artifactId || null,
                                    title: p.title || DEFAULT_TITLE,
                                    code: typeof p.code === 'string' ? p.code : ''
                                };
                            }
                        });
                    }
                }
            } catch (e) {
                console.error("Failed to load state from localStorage:", e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    showToast("Storage full! Delete some artifacts to save new ones.", 5000);
                } else {
                    console.error("Failed to save state:", e);
                }
            }
        }

        /**
         * Artifact Operations
         */
        function createArtifactId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function findArtifact(id) {
            return state.artifacts.find(a => a.id === id) || null;
        }

        function deleteArtifact(id) {
            state.artifacts = state.artifacts.filter(a => a.id !== id);
            // Panes referencing the deleted artifact keep their content,
            // but become unsaved copies
            state.panes.forEach(p => {
                if (p.artifactId === id) p.artifactId = null;
            });
            saveState();
        }

        /**
         * Unsaved Changes Detection
         */
        function paneUnsaved(i) {
            const p = state.panes[i];
            if (!p.code) return false;
            const artifact = p.artifactId ? findArtifact(p.artifactId) : null;
            if (!artifact) return true;
            return p.code !== artifact.code || p.title !== artifact.title;
        }

        function updateUnsavedIndicators() {
            // Header indicator tracks the active pane
            elements.unsavedIndicator.style.opacity = paneUnsaved(state.activePane) ? '1' : '0';
            // Per-pane dots
            panes.forEach((p, i) => {
                p.unsavedDot.classList.toggle('visible', paneUnsaved(i));
            });
        }

        /**
         * DOM Elements
         */
        const elements = {
            newArtifactBtn: document.getElementById('new-artifact-btn'),
            artifactTitle: document.getElementById('artifact-title'),
            saveBtn: document.getElementById('save-btn'),
            unsavedIndicator: document.getElementById('unsaved-indicator'),
            sidebar: document.getElementById('sidebar'),
            savedList: document.getElementById('saved-list'),
            railToggleBtn: document.getElementById('rail-toggle-btn'),
            paneRow: document.getElementById('pane-row'),
            viewSingleBtn: document.getElementById('view-single-btn'),
            viewSplitBtn: document.getElementById('view-split-btn'),
            deviceButtons: document.querySelectorAll('.device-btn'),
            customWidthInput: document.getElementById('custom-width'),
            fullscreenBtn: document.getElementById('fullscreen-btn'),
            fullscreenModal: document.getElementById('fullscreen-modal'),
            fullscreenFrame: document.getElementById('fullscreen-frame'),
            closeFullscreenBtn: document.getElementById('close-fullscreen-btn'),
            fileInput: document.getElementById('file-input'),
            confirmOverlay: document.getElementById('confirm-overlay'),
            confirmMessage: document.getElementById('confirm-message'),
            confirmCancelBtn: document.getElementById('confirm-cancel-btn'),
            confirmOkBtn: document.getElementById('confirm-ok-btn'),
            confirmOkText: document.getElementById('confirm-ok-text'),
        };

        const panes = [0, 1].map(i => {
            const el = document.getElementById('pane-' + i);
            return {
                el,
                header: el.querySelector('.pane-header'),
                titleEl: el.querySelector('.pane-title'),
                unsavedDot: el.querySelector('.pane-unsaved-dot'),
                body: el.querySelector('.pane-body'),
                wrapper: el.querySelector('.frame-wrapper'),
                placeholder: el.querySelector('.preview-placeholder'),
                frame: el.querySelector('.preview-frame'),
                overlay: el.querySelector('.drop-overlay'),
                blobUrl: null,
                renderedCode: null
            };
        });

        /**
         * Confirm Dialog
         */
        let confirmCallback = null;

        function showConfirmDialog(message, onConfirm, okText = 'Delete') {
            confirmCallback = onConfirm;
            elements.confirmMessage.textContent = message;
            elements.confirmOkText.textContent = okText;
            elements.confirmOverlay.classList.add('active');
            elements.confirmCancelBtn.focus();
        }

        function hideConfirmDialog() {
            elements.confirmOverlay.classList.remove('active');
            confirmCallback = null;
        }

        elements.confirmCancelBtn.addEventListener('click', hideConfirmDialog);

        elements.confirmOkBtn.addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
                confirmCallback = null;
            }
            hideConfirmDialog();
        });

        elements.confirmOverlay.addEventListener('click', (e) => {
            if (e.target === elements.confirmOverlay) {
                hideConfirmDialog();
            }
        });

        /**
         * Toast
         */
        const toast = document.getElementById('toast');
        let toastTimer = null;

        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        /**
         * Pane Rendering
         */
        function renderPane(i) {
            const pane = panes[i];
            const data = state.panes[i];
            const hasCode = data.code.trim().length > 0;

            pane.titleEl.textContent = data.title;
            pane.wrapper.classList.toggle('preview-bg-filled', hasCode);
            pane.placeholder.style.display = hasCode ? 'none' : '';

            // Only re-blob when the code actually changed (avoids iframe flash)
            if (pane.renderedCode !== data.code) {
                pane.renderedCode = data.code;
                if (pane.blobUrl) {
                    URL.revokeObjectURL(pane.blobUrl);
                    pane.blobUrl = null;
                }
                if (hasCode) {
                    const blob = new Blob([data.code], { type: 'text/html' });
                    pane.blobUrl = URL.createObjectURL(blob);
                    pane.frame.src = pane.blobUrl;
                } else {
                    // about:blank is safe; setting src='' can reload the parent page
                    pane.frame.src = 'about:blank';
                }
            }
        }

        function renderLayout() {
            const split = state.viewMode === 'split';
            elements.paneRow.classList.toggle('split', split);
            panes.forEach((pane, i) => {
                // In single mode only the active pane is visible; split shows both
                pane.el.classList.toggle('hidden', !split && i !== state.activePane);
                pane.el.classList.toggle('active', i === state.activePane);
            });
            elements.viewSingleBtn.classList.toggle('btn-active', !split);
            elements.viewSplitBtn.classList.toggle('btn-active', split);
        }

        function focusPane(i) {
            if (state.activePane === i) return;
            state.activePane = i;
            elements.artifactTitle.value = state.panes[i].title;
            renderLayout();
            updateUnsavedIndicators();
            updateSavedListUI();
            saveState();
        }

        function setViewMode(mode) {
            state.viewMode = mode;
            renderLayout();
            saveState();
        }

        function setPaneContent(i, code, title, artifactId = null) {
            state.panes[i] = { artifactId, title, code };
            renderPane(i);
            if (i === state.activePane) {
                elements.artifactTitle.value = title;
            }
            updateUnsavedIndicators();
            saveState();
        }

        function clearPane(i) {
            setPaneContent(i, '', DEFAULT_TITLE, null);
        }

        /**
         * Header Title Input — bound to the active pane
         */
        elements.artifactTitle.addEventListener('input', () => {
            const i = state.activePane;
            state.panes[i].title = elements.artifactTitle.value;
            panes[i].titleEl.textContent = elements.artifactTitle.value || DEFAULT_TITLE;
            updateUnsavedIndicators();
            saveState();
        });

        elements.artifactTitle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                elements.saveBtn.click();
            }
        });

        // Pane header click focuses that pane
        panes.forEach((pane, i) => {
            pane.header.addEventListener('click', () => focusPane(i));
        });

        /**
         * Device Presets & Resizing — applies to all visible panes
         */
        function setPreviewWidth(width) {
            panes.forEach(p => { p.wrapper.style.width = width; });

            if (width === '100%') {
                elements.customWidthInput.value = '';
            } else {
                elements.customWidthInput.value = parseInt(width);
            }

            elements.deviceButtons.forEach(btn => {
                btn.classList.toggle('btn-active', btn.dataset.width === width);
            });
        }

        elements.deviceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                setPreviewWidth(btn.dataset.width);
            });
        });

        elements.customWidthInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val) {
                setPreviewWidth(val + 'px');
                elements.deviceButtons.forEach(btn => btn.classList.remove('btn-active'));
            }
        });

        elements.viewSingleBtn.addEventListener('click', () => setViewMode('single'));
        elements.viewSplitBtn.addEventListener('click', () => setViewMode('split'));

        /**
         * Fullscreen Logic — active pane only
         */
        function openFullscreen() {
            const data = state.panes[state.activePane];
            elements.fullscreenModal.classList.remove('hidden');
            elements.fullscreenFrame.style.background = data.code.trim() ? '#ffffff' : 'var(--pane-bg)';

            if (fullscreenBlobUrl) URL.revokeObjectURL(fullscreenBlobUrl);
            const blob = new Blob([data.code], { type: 'text/html' });
            fullscreenBlobUrl = URL.createObjectURL(blob);
            elements.fullscreenFrame.src = fullscreenBlobUrl;
        }

        function closeFullscreen() {
            elements.fullscreenModal.classList.add('hidden');
            if (fullscreenBlobUrl) {
                URL.revokeObjectURL(fullscreenBlobUrl);
                fullscreenBlobUrl = null;
            }
            elements.fullscreenFrame.src = '';
        }

        elements.fullscreenBtn.addEventListener('click', openFullscreen);
        elements.closeFullscreenBtn.addEventListener('click', closeFullscreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && elements.confirmOverlay.classList.contains('active')) {
                hideConfirmDialog();
                return;
            }
            if (e.key === 'Escape' && !elements.fullscreenModal.classList.contains('hidden')) {
                closeFullscreen();
            }
            // Ctrl+B / Cmd+B → Toggle Sidebar
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidebar(!sidebarVisible);
            }
            // Ctrl+N / Cmd+N → New (clear active pane)
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                handleNewArtifact();
            }
            // Ctrl+S / Cmd+S → Save active pane
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                elements.saveBtn.click();
            }
        });

        /**
         * Sidebar & Saved Artifacts Logic
         */
        let sidebarVisible = false;

        function updateSavedListUI() {
            const list = elements.savedList;
            while (list.firstChild) list.removeChild(list.firstChild);

            if (state.artifacts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-state-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <p class="empty-state-text">No saved artifacts</p>
                        <p class="empty-state-sub">Drop a file, click Save, and it appears here</p>
                    </div>`;
                return;
            }

            state.artifacts.forEach(artifact => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                // Highlight if loaded in any pane
                if (state.panes.some(p => p.artifactId === artifact.id)) {
                    item.classList.add('active');
                }

                const titleSpan = document.createElement('span');
                titleSpan.className = 'sidebar-item-title';
                titleSpan.textContent = artifact.title;

                const metaSpan = document.createElement('span');
                metaSpan.className = 'sidebar-item-meta';
                metaSpan.textContent = formatRelativeTime(artifact.updatedAt);

                const delBtn = document.createElement('button');
                delBtn.className = 'sidebar-item-del';
                delBtn.title = 'Delete';
                delBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

                const btnContainer = document.createElement('div');
                btnContainer.style.cssText = 'display: flex; align-items: center; gap: 0.25rem; flex-shrink: 0;';
                btnContainer.appendChild(metaSpan);
                btnContainer.appendChild(delBtn);

                item.appendChild(titleSpan);
                item.appendChild(btnContainer);

                // Click loads into the ACTIVE pane
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.sidebar-item-del')) return;
                    setPaneContent(state.activePane, artifact.code, artifact.title, artifact.id);
                    updateSavedListUI();
                    if (window.innerWidth < 768) {
                        toggleSidebar(false);
                    }
                });

                // Delete button (hold Shift to skip confirmation)
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const doDelete = () => {
                        deleteArtifact(artifact.id);
                        updateSavedListUI();
                        updateUnsavedIndicators();
                    };
                    if (e.shiftKey) {
                        doDelete();
                    } else {
                        showConfirmDialog(`Delete "${artifact.title}"?`, doDelete);
                    }
                });

                list.appendChild(item);
            });
        }

        function formatRelativeTime(isoString) {
            const diff = Date.now() - new Date(isoString).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return new Date(isoString).toLocaleDateString();
        }

        function toggleSidebar(show) {
            if (show === sidebarVisible) return;
            sidebarVisible = show;

            elements.sidebar.style.width = show ? '256px' : '0';
            elements.railToggleBtn.classList.toggle('active', show);
        }

        elements.railToggleBtn.addEventListener('click', () => toggleSidebar(!sidebarVisible));

        /**
         * New Button — clears the active pane
         */
        function handleNewArtifact() {
            const i = state.activePane;
            if (paneUnsaved(i)) {
                showConfirmDialog(
                    `Pane ${i === 0 ? 'A' : 'B'} has unsaved changes. Discard them?`,
                    () => { clearPane(i); updateSavedListUI(); },
                    'Discard'
                );
            } else {
                clearPane(i);
                updateSavedListUI();
            }
        }

        elements.newArtifactBtn.addEventListener('click', handleNewArtifact);

        /**
         * Save Logic — saves the active pane
         */
        elements.saveBtn.addEventListener('click', () => {
            const i = state.activePane;
            const pane = state.panes[i];
            const title = elements.artifactTitle.value.trim();

            if (!pane.code) {
                showToast("Nothing to save. Drop a file first.", 3000);
                return;
            }
            if (!title) {
                showToast("Please enter a title.", 3000);
                return;
            }
            if (title === DEFAULT_TITLE) {
                elements.artifactTitle.focus();
                elements.artifactTitle.select();
                return;
            }

            const now = new Date().toISOString();
            let artifact = pane.artifactId ? findArtifact(pane.artifactId) : null;

            if (artifact) {
                artifact.code = pane.code;
                artifact.title = title;
                artifact.updatedAt = now;
            } else {
                artifact = {
                    id: createArtifactId(),
                    title,
                    code: pane.code,
                    createdAt: now,
                    updatedAt: now
                };
                state.artifacts.push(artifact);
                pane.artifactId = artifact.id;
            }
            pane.title = title;

            saveState();
            updateSavedListUI();
            updateUnsavedIndicators();

            // Visual feedback
            const originalText = elements.saveBtn.textContent;
            elements.saveBtn.textContent = 'Saved!';
            setTimeout(() => {
                elements.saveBtn.textContent = originalText;
            }, 1000);
        });

        /**
         * Drag & Drop File Loading — onto the preview panes
         */
        const ALLOWED_EXTENSIONS = new Set(['.html', '.htm', '.svg', '.txt']);
        const MAX_FILE_SIZE = 1024 * 1024; // 1MB

        function isValidFile(file) {
            if (file.size > MAX_FILE_SIZE) {
                const mb = (file.size / 1024 / 1024).toFixed(1);
                showToast(`File too large (${mb}MB). Max 1MB.`);
                return false;
            }
            if (file.name.includes('.')) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.has(ext)) {
                    showToast(`Unsupported file type: ${ext}. Drop an HTML file.`);
                    return false;
                }
                return true;
            }
            if (file.type && !file.type.startsWith('text/') && file.type !== 'image/svg+xml') {
                showToast('Binary files not supported. Drop an HTML file.');
                return false;
            }
            return true;
        }

        function loadFileIntoPane(file, i) {
            const reader = new FileReader();
            reader.onload = () => {
                const titleWithoutExt = file.name.replace(/\.[^/.]+$/, '');
                setPaneContent(i, reader.result, titleWithoutExt || DEFAULT_TITLE, null);
                focusPane(i);
                showToast(`Loaded ${file.name} → Pane ${i === 0 ? 'A' : 'B'}`);
            };
            reader.onerror = () => {
                showToast('Error reading file. Try again.');
            };
            reader.readAsText(file);
        }

        function handleDroppedFiles(fileList, targetPane) {
            const files = Array.from(fileList).filter(isValidFile);
            if (files.length === 0) return;

            loadFileIntoPane(files[0], targetPane);

            if (files.length > 1) {
                // Second file goes to the other pane; show both
                loadFileIntoPane(files[1], 1 - targetPane);
                setViewMode('split');
                if (files.length > 2) {
                    showToast('Only the first 2 files were loaded.');
                }
            }
        }

        // Global drag tracking: show overlays whenever files are over the window
        let dragDepth = 0;

        function endDrag() {
            dragDepth = 0;
            document.body.classList.remove('dragging');
            panes.forEach(p => p.el.classList.remove('hot'));
        }

        function setHotPane(i) {
            panes.forEach((p, j) => p.el.classList.toggle('hot', j === i));
        }

        window.addEventListener('dragenter', (e) => {
            if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes('Files')) return;
            e.preventDefault();
            dragDepth++;
            if (dragDepth === 1) {
                document.body.classList.add('dragging');
            }
        });

        window.addEventListener('dragleave', () => {
            if (dragDepth === 0) return;
            dragDepth--;
            if (dragDepth === 0) {
                endDrag();
            }
        });

        window.addEventListener('dragover', (e) => {
            e.preventDefault(); // Required to allow drop
        });

        // Safety net: prevent browser navigation on stray drops, reset overlay state
        window.addEventListener('drop', (e) => {
            e.preventDefault();
            endDrag();
        });

        window.addEventListener('blur', endDrag);

        // Per-pane drop targets. During a drag the overlay sits on top of the
        // iframe (pointer-events:auto) and is the real drop target; the pane-body
        // handler covers the padding area around the frame.
        panes.forEach((pane, i) => {
            pane.overlay.addEventListener('dragover', (e) => {
                e.preventDefault();
                setHotPane(i);
            });
            pane.overlay.addEventListener('drop', (e) => {
                e.preventDefault();
                endDrag();
                if (!e.dataTransfer || !e.dataTransfer.files.length) return;
                handleDroppedFiles(e.dataTransfer.files, i);
            });
            pane.body.addEventListener('dragover', (e) => {
                e.preventDefault();
                setHotPane(i);
            });
            pane.body.addEventListener('drop', (e) => {
                e.preventDefault();
                endDrag();
                if (!e.dataTransfer || !e.dataTransfer.files.length) return;
                handleDroppedFiles(e.dataTransfer.files, i);
            });
        });

        /**
         * Click empty pane → file picker
         */
        let fileInputTarget = 0;

        panes.forEach((pane, i) => {
            pane.body.addEventListener('click', () => {
                focusPane(i);
                if (!state.panes[i].code) {
                    fileInputTarget = i;
                    elements.fileInput.click();
                }
            });
        });

        elements.fileInput.addEventListener('change', () => {
            if (elements.fileInput.files.length) {
                handleDroppedFiles(elements.fileInput.files, fileInputTarget);
                elements.fileInput.value = ''; // Allow picking the same file again
            }
        });

        /**
         * Initialize
         */
        loadState();
        elements.artifactTitle.value = state.panes[state.activePane].title;
        panes.forEach((_, i) => renderPane(i));
        renderLayout();
        updateSavedListUI();
        updateUnsavedIndicators();
        setPreviewWidth('100%');
    </script>
</body>
</html>
