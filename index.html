<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Artifacts</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better aesthetics in dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #737373;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Drag and drop — overlay on code panel */
        #drop-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #drop-overlay.active {
            opacity: 1;
        }
        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #toast.visible {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-neutral-950 h-screen flex flex-col overflow-hidden font-sans text-neutral-100">

    <!-- Header -->
    <header class="bg-neutral-950 border-b border-neutral-900 h-14 flex items-center justify-between px-4 shrink-0 z-20 relative">
        <div class="flex items-center gap-2">
            <h1 class="text-lg font-bold text-neutral-100">just artifacts</h1>
        </div>
        <div class="flex items-center gap-1.5">
            <button id="new-artifact-btn" class="px-3 py-1.5 bg-white hover:bg-neutral-200 text-black text-xs font-semibold rounded transition-colors flex items-center gap-1.5" title="New Artifact (Ctrl+N)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New
            </button>
            <div class="w-px h-4 bg-neutral-700 mx-1"></div>
            <button id="text-wrap-btn" class="p-2 hover:bg-neutral-700 rounded text-sm text-neutral-300 transition-colors" title="Toggle Text Wrap">
                Wrap: On
            </button>
            <button id="fullscreen-btn" class="p-2 hover:bg-neutral-700 rounded text-sm text-neutral-300 transition-colors" title="Fullscreen Preview">
                Fullscreen
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden relative">

        <!-- Sidebar (Hidden by default) -->
        <aside id="sidebar" class="absolute top-0 left-0 bottom-0 w-64 bg-neutral-950 border-r border-neutral-900 transform -translate-x-full transition-transform duration-300 z-30 flex flex-col shadow-lg">
            <div class="p-4 border-b border-neutral-900 bg-neutral-950 flex justify-between items-center">
                <h2 class="font-semibold text-neutral-200">Saved Artifacts</h2>
                <button id="close-sidebar-btn" class="text-neutral-400 hover:text-neutral-100 transition-colors">
                    &times;
                </button>
            </div>
            <div id="saved-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Saved items will be injected here -->
                <div class="text-sm text-neutral-500 text-center py-4">No saved artifacts</div>
            </div>
            <div class="p-4 border-t border-neutral-900 bg-neutral-950">
                <button id="new-artifact-sidebar-btn" class="w-full py-2 px-4 bg-white hover:bg-neutral-200 text-black rounded text-sm font-medium transition-colors border border-transparent">
                    + New Artifact
                </button>
            </div>
        </aside>

        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" class="absolute inset-0 bg-black/50 z-20 hidden transition-opacity opacity-0"></div>

        <!-- Code Panel (Left, 30%) -->
        <div id="code-panel" class="w-[30%] h-full flex flex-col border-r border-neutral-900 bg-neutral-950 relative z-10">
            <textarea id="code-editor" class="w-full h-full p-4 font-mono text-sm resize-none focus:outline-none bg-neutral-950 text-neutral-300 placeholder-neutral-600" spellcheck="false" placeholder="// Paste code or drag & drop a file..."></textarea>
            <!-- Drop overlay for drag-and-drop -->
            <div id="drop-overlay" class="absolute inset-0 z-20 flex items-center justify-center bg-neutral-950/95 border-2 border-dashed border-green-500/50 m-2">
                <div class="text-center">
                    <svg class="mx-auto mb-2" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="text-green-400 text-sm font-medium">Drop file to load</p>
                    <p class="text-neutral-500 text-xs mt-1">.html .jsx .tsx .css .js .txt</p>
                </div>
            </div>
        </div>

        <!-- Preview Panel (Right, 70%) -->
        <div class="w-[70%] h-full flex flex-col bg-neutral-950 relative z-10">
            <!-- Iframe Container - Dark checkerboard or just dark bg -->
            <div class="flex-1 flex items-center justify-center p-8 overflow-hidden bg-neutral-950">
                <div id="preview-wrapper" class="w-full h-full bg-white shadow-2xl transition-all duration-300 relative">
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 text-neutral-400 text-sm">
                        Preview Area (White Background)
                    </div>
                    <!-- Iframe keeps white background by default as it mimics browser page -->
                    <iframe id="preview-frame" class="w-full h-full border-0 relative z-10 bg-white" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
                </div>
            </div>

            <!-- Device Presets Bar -->
            <div class="h-12 bg-neutral-950 border-t border-neutral-900 flex items-center justify-center gap-2 px-4 shrink-0">
                <span class="text-xs text-neutral-400 font-medium mr-2">VIEWPORT:</span>
                <button class="device-btn px-3 py-1 text-xs font-medium rounded hover:bg-neutral-700 text-neutral-400 border border-transparent hover:border-neutral-600 transition-colors" data-width="375px">Mobile (375px)</button>
                <button class="device-btn px-3 py-1 text-xs font-medium rounded hover:bg-neutral-700 text-neutral-400 border border-transparent hover:border-neutral-600 transition-colors" data-width="768px">Tablet (768px)</button>
                <button class="device-btn px-3 py-1 text-xs font-medium rounded hover:bg-neutral-700 text-neutral-400 border border-transparent hover:border-neutral-600 transition-colors" data-width="1024px">Desktop (1024px)</button>
                <button class="device-btn px-3 py-1 text-xs font-medium rounded bg-neutral-700 text-neutral-200 border border-neutral-600" data-width="100%">Full Width</button>
                <div class="h-4 w-px bg-neutral-600 mx-2"></div>
                <input type="number" id="custom-width" placeholder="Width (px)" class="w-24 px-2 py-1 text-xs border border-neutral-600 rounded bg-neutral-700 text-neutral-200 focus:outline-none focus:border-white placeholder-neutral-500">
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-neutral-950 border-t border-neutral-900 h-14 flex items-center justify-between px-4 shrink-0 z-20">
        <div class="flex items-center gap-4">
            <button id="sidebar-toggle-btn" class="p-2 hover:bg-neutral-700 rounded text-neutral-400 hover:text-neutral-100 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div class="relative group">
                <input type="text" id="artifact-title" value="New_Artifact" class="text-sm font-medium text-neutral-200 border-b border-transparent hover:border-neutral-500 focus:border-white focus:outline-none px-1 py-0.5 bg-transparent w-48 transition-colors" />
                <span class="absolute -top-3 left-1 text-[10px] text-neutral-500 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Click to rename</span>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <select id="language-select" class="text-sm border border-neutral-600 rounded px-2 py-1 bg-neutral-700 focus:outline-none focus:border-white text-neutral-200">
                <option value="html">HTML</option>
                <option value="react">React</option>
            </select>
            <button id="save-btn" class="px-4 py-1.5 bg-white hover:bg-neutral-200 text-black text-sm font-medium rounded transition-colors shadow-sm flex items-center gap-2 border border-transparent">
                <span>Save</span>
            </button>
        </div>
    </footer>

    <!-- Fullscreen Modal -->
    <div id="fullscreen-modal" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="absolute top-4 right-4 z-50 flex items-center gap-3 opacity-0 hover:opacity-100 transition-opacity duration-300">
            <span class="text-neutral-400 text-xs bg-black/80 px-2 py-1 rounded shadow">Press ESC to exit</span>
            <button id="close-fullscreen-btn" class="text-neutral-400 hover:text-white p-2 bg-black/80 rounded shadow transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="flex-1 bg-black relative w-full h-full"> 
             <iframe id="fullscreen-frame" class="w-full h-full border-0 bg-white" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <!-- Toast notification for drag-and-drop feedback -->
    <div id="toast"></div>

    <script>
        /**
         * Constants & Configuration
         */
        const STORAGE_KEY = 'just-artifacts-data';
        const DEFAULT_TITLE = 'New_Artifact';

        /**
         * State Management
         */
        const state = {
            artifacts: [],
            activeArtifactId: null,

            // Computed property for easy access
            get activeArtifact() {
                return this.artifacts.find(a => a.id === this.activeArtifactId) || null;
            }
        };

        /**
         * LocalStorage Helpers
         */
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    state.artifacts = parsed.artifacts || [];
                    state.activeArtifactId = parsed.activeArtifactId || null;
                }
            } catch (e) {
                console.error("Failed to load state from localStorage:", e);
            }
        }

        function saveState() {
            try {
                const data = {
                    artifacts: state.artifacts,
                    activeArtifactId: state.activeArtifactId
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    alert("Storage full! Please delete some artifacts to save new ones.");
                } else {
                    console.error("Failed to save state:", e);
                }
            }
        }

        /**
         * Artifact Operations
         */
        function createArtifactId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createNewArtifact() {
            return {
                id: createArtifactId(),
                title: DEFAULT_TITLE,
                code: '',
                language: 'html',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
        }

        function saveCurrentArtifact(code, language, title) {
            let artifact = state.activeArtifact;
            const now = new Date().toISOString();

            if (!artifact) {
                // If no active artifact, create one
                artifact = createNewArtifact();
                state.artifacts.push(artifact);
                state.activeArtifactId = artifact.id;
            }

            artifact.code = code;
            artifact.language = language;
            artifact.title = title;
            artifact.updatedAt = now;

            saveState();
            return artifact;
        }

        function deleteArtifact(id) {
            state.artifacts = state.artifacts.filter(a => a.id !== id);
            if (state.activeArtifactId === id) {
                state.activeArtifactId = null;
            }
            saveState();
        }

        function setActiveArtifact(id) {
            state.activeArtifactId = id;
            saveState(); // Persist the active selection
        }

        /**
         * Unsaved Changes Detection
         */
        function hasUnsavedChanges() {
            const code = elements.codeEditor.value.trim();
            const language = elements.languageSelect.value;
            const title = elements.artifactTitle.value.trim();

            // No active artifact — unsaved if there's any content at all
            if (!state.activeArtifactId) {
                return code.length > 0;
            }

            const artifact = state.activeArtifact;
            // Active ID points to a deleted artifact — content is unsaved
            if (!artifact) {
                return code.length > 0;
            }

            // Compare current editor state with the saved version
            return code !== artifact.code ||
                   language !== artifact.language ||
                   title !== artifact.title;
        }

        /**
         * DOM Elements
         */
        const elements = {
            newArtifactBtn: document.getElementById('new-artifact-btn'),
            codeEditor: document.getElementById('code-editor'),
            previewFrame: document.getElementById('preview-frame'),
            languageSelect: document.getElementById('language-select'),
            textWrapBtn: document.getElementById('text-wrap-btn'),
            artifactTitle: document.getElementById('artifact-title'),
            saveBtn: document.getElementById('save-btn'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebar-overlay'),
            sidebarToggleBtn: document.getElementById('sidebar-toggle-btn'),
            closeSidebarBtn: document.getElementById('close-sidebar-btn'),
            savedList: document.getElementById('saved-list'),
            newArtifactSidebarBtn: document.getElementById('new-artifact-sidebar-btn'),
            previewWrapper: document.getElementById('preview-wrapper'),
            deviceButtons: document.querySelectorAll('.device-btn'),
            customWidthInput: document.getElementById('custom-width'),
            fullscreenBtn: document.getElementById('fullscreen-btn'),
            fullscreenModal: document.getElementById('fullscreen-modal'),
            fullscreenFrame: document.getElementById('fullscreen-frame'),
            closeFullscreenBtn: document.getElementById('close-fullscreen-btn'),
        };

        /**
         * Rendering Logic
         */
        function getHTMLContent(code) {
            return code;
        }

        function getReactContent(code) {
            return `<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    ${code}

    // Auto-render logic
    try {
        const rootElement = document.getElementById('root');
        if (typeof App !== 'undefined') {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } else {
            // If user didn't define App, maybe they just wrote JSX or something else?
            // We'll leave it to them, or we could try to render whatever they return.
            // For now, assume App component.
        }
    } catch (e) {
        console.error("React render error:", e);
        document.body.innerHTML += '<pre style="color:red; padding:1rem;">' + e.message + '</pre>';
    }
  <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;
            let content = '';

            if (language === 'react') {
                content = getReactContent(code);
            } else {
                content = getHTMLContent(code);
            }

            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            elements.previewFrame.src = url;

            // Also update fullscreen frame if open
            if (!elements.fullscreenModal.classList.contains('hidden')) {
                elements.fullscreenFrame.src = url;
            }
        }

        // Debounce update to avoid flashing on every keystroke
        let debounceTimer;
        function debouncedUpdatePreview() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updatePreview, 500); // 500ms delay
        }

        /**
         * UI Logic
         */
        function initUI() {
            // Load active artifact or reset
            if (state.activeArtifactId && state.activeArtifact) {
                loadArtifactToUI(state.activeArtifact);
            } else {
                resetUI();
            }
            updatePreview();
        }

        function loadArtifactToUI(artifact) {
            elements.codeEditor.value = artifact.code || '';
            elements.languageSelect.value = artifact.language || 'html';
            elements.artifactTitle.value = artifact.title || DEFAULT_TITLE;
            updatePreview();
        }

        function resetUI() {
            elements.codeEditor.value = '';
            elements.languageSelect.value = 'html';
            elements.artifactTitle.value = DEFAULT_TITLE;
            state.activeArtifactId = null; // Ensure no ID is set so next save creates new
            updatePreview();
        }

        function toggleTextWrap() {
            if (elements.codeEditor.style.whiteSpace === 'pre') {
                elements.codeEditor.style.whiteSpace = 'pre-wrap';
                elements.textWrapBtn.textContent = 'Wrap: On';
            } else {
                elements.codeEditor.style.whiteSpace = 'pre';
                elements.textWrapBtn.textContent = 'Wrap: Off';
            }
        }

        // Initial set
        elements.codeEditor.style.whiteSpace = 'pre-wrap';

        /**
         * Event Listeners
         */
        elements.codeEditor.addEventListener('input', debouncedUpdatePreview);

        elements.languageSelect.addEventListener('change', () => {
            updatePreview();
        });

        elements.textWrapBtn.addEventListener('click', toggleTextWrap);

        /**
         * Device Presets & Resizing
         */
        function setPreviewWidth(width) {
            elements.previewWrapper.style.width = width;

            // Update UI state
            elements.deviceButtons.forEach(btn => {
                const btnWidth = btn.dataset.width;
                if (btnWidth === width) {
                    // Active state (Dark Mode)
                    btn.classList.add('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                    btn.classList.remove('bg-neutral-700', 'border-transparent', 'text-neutral-400', 'hover:bg-neutral-700');
                } else {
                    // Inactive state (Dark Mode)
                    btn.classList.remove('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                    btn.classList.add('bg-neutral-700', 'border-transparent', 'text-neutral-400', 'hover:bg-neutral-700');
                    if (width === '100%' && btn.dataset.width === '100%') {
                         // Full Width match
                         btn.classList.add('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                         btn.classList.remove('bg-neutral-700', 'border-transparent', 'text-neutral-400', 'hover:bg-neutral-700');
                    }
                }
            });
        }

        elements.deviceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const width = btn.dataset.width;
                setPreviewWidth(width);
                elements.customWidthInput.value = ''; // Clear custom input
            });
        });

        elements.customWidthInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val) {
                setPreviewWidth(val + 'px');
                // Deselect buttons logic handled in setPreviewWidth if matched, but here we likely want to clear active classes
                 elements.deviceButtons.forEach(btn => {
                    btn.classList.remove('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                    btn.classList.add('bg-neutral-700', 'border-transparent', 'text-neutral-400');
                });
            }
        });

        /**
         * Fullscreen Logic
         */
        function openFullscreen() {
            elements.fullscreenModal.classList.remove('hidden');
            // Ensure content is synced
            const currentLang = elements.languageSelect.value;
            const content = currentLang === 'react' ? getReactContent(elements.codeEditor.value) : getHTMLContent(elements.codeEditor.value);
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            elements.fullscreenFrame.src = url;
        }

        function closeFullscreen() {
            elements.fullscreenModal.classList.add('hidden');
            elements.fullscreenFrame.src = ''; // clear to stop scripts
        }

        elements.fullscreenBtn.addEventListener('click', openFullscreen);
        elements.closeFullscreenBtn.addEventListener('click', closeFullscreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !elements.fullscreenModal.classList.contains('hidden')) {
                closeFullscreen();
            }
            // Ctrl+N / Cmd+N → New Artifact
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                handleNewArtifact();
            }
        });


        /**
         * Sidebar & Saved Artifacts Logic
         */
        function updateSavedListUI() {
            elements.savedList.innerHTML = '';

            if (state.artifacts.length === 0) {
                elements.savedList.innerHTML = '<div class="text-sm text-neutral-500 text-center py-4">No saved artifacts</div>';
                return;
            }

            state.artifacts.forEach(artifact => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-2 hover:bg-neutral-700 rounded cursor-pointer group transition-colors';
                // Highlight active (Dark Mode)
                if (state.activeArtifactId === artifact.id) {
                    item.classList.add('bg-neutral-800');
                } else {
                      
                }

                item.innerHTML = `
                    <span class="text-sm font-medium text-neutral-300 truncate flex-1 group-hover:text-neutral-100">${artifact.title}</span>
                    <button class="delete-btn p-1 text-neutral-500 hover:text-white opacity-0 group-hover:opacity-100 transition-all" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                `;

                // Load on click
                item.addEventListener('click', (e) => {
                    // Don't trigger if delete button clicked
                    if (e.target.closest('.delete-btn')) return;

                    setActiveArtifact(artifact.id);
                    loadArtifactToUI(artifact);
                    // Update list highlighting
                    updateSavedListUI();
                    // Close sidebar on mobile/small screens if desired, or just leave open
                    if (window.innerWidth < 768) {
                        toggleSidebar(false);
                    }
                });

                // Delete handler
                const deleteBtn = item.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`Delete "${artifact.title}"?`)) {
                        deleteArtifact(artifact.id);
                        if (state.activeArtifactId === null) {
                            resetUI(); // If we deleted the active one
                        }
                        updateSavedListUI();
                    }
                });

                elements.savedList.appendChild(item);
            });
        }

        function toggleSidebar(show) {
            if (show) {
                elements.sidebar.classList.remove('-translate-x-full');
                elements.sidebarOverlay.classList.remove('hidden');
                setTimeout(() => elements.sidebarOverlay.classList.remove('opacity-0'), 10); // Fade in
            } else {
                elements.sidebar.classList.add('-translate-x-full');
                elements.sidebarOverlay.classList.add('opacity-0');
                setTimeout(() => elements.sidebarOverlay.classList.add('hidden'), 300); // Wait for fade out
            }
        }

        elements.sidebarToggleBtn.addEventListener('click', () => toggleSidebar(true));
        elements.closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
        elements.sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

        elements.newArtifactSidebarBtn.addEventListener('click', () => {
            handleNewArtifact();
            toggleSidebar(false);
        });

        /**
         * New Artifact Button (Header)
         */
        function handleNewArtifact() {
            if (hasUnsavedChanges()) {
                if (!confirm('You have unsaved changes. Discard them and create a new artifact?')) {
                    return;
                }
            }
            resetUI();
        }

        elements.newArtifactBtn.addEventListener('click', handleNewArtifact);

        /**
         * Save Logic
         */
        elements.saveBtn.addEventListener('click', () => {
            let title = elements.artifactTitle.value.trim();
            if (!title) {
                alert("Please enter a title.");
                return;
            }

            if (title === DEFAULT_TITLE) {
                // Prompt user to rename
                elements.artifactTitle.focus();
                elements.artifactTitle.select();
                return;
            }

            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;

            saveCurrentArtifact(code, language, title);
            updateSavedListUI();

            // Visual feedback
            const originalText = elements.saveBtn.innerHTML;
            elements.saveBtn.innerHTML = `<span>Saved!</span>`;
            setTimeout(() => {
                elements.saveBtn.innerHTML = originalText;
            }, 1000);
        });

        // Handle Enter key in title input to trigger save (optional but nice)
        elements.artifactTitle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                elements.saveBtn.click();
                elements.codeEditor.focus(); // Return focus to editor
            }
        });

        /**
         * Drag & Drop File Loading
         * -------------------------
         * Supports: .html .htm .jsx .tsx .css .js .ts .txt .json .md .xml .svg .csv
         * Rejects: binary files (images, PDFs, etc.), files > 1MB
         * Auto-detects language from extension (.jsx/.tsx → React, rest → HTML)
         * Sets editor title to filename (without extension)
         */
        const ALLOWED_EXTENSIONS = new Set([
            '.html', '.htm', '.jsx', '.tsx', '.css', '.js', '.ts',
            '.txt', '.json', '.md', '.xml', '.svg', '.csv'
        ]);
        const LANG_MAP = {
            '.jsx': 'react',
            '.tsx': 'react',
        };
        const MAX_FILE_SIZE = 1024 * 1024; // 1MB

        const dropOverlay = document.getElementById('drop-overlay');
        const toast = document.getElementById('toast');
        let dragCounter = 0;
        let toastTimer = null;

        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        function detectLanguage(filename) {
            const ext = '.' + filename.split('.').pop().toLowerCase();
            return LANG_MAP[ext] || 'html';
        }

        function isValidFile(file) {
            // Reject oversized files
            if (file.size > MAX_FILE_SIZE) {
                const mb = (file.size / 1024 / 1024).toFixed(1);
                showToast(`File too large (${mb}MB). Max 1MB.`);
                return false;
            }
            // Validate by extension if present
            if (file.name.includes('.')) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.has(ext)) {
                    showToast(`Unsupported file type: ${ext}`);
                    return false;
                }
                return true;
            }
            // No extension — check MIME type as fallback
            if (file.type && !file.type.startsWith('text/')
                && file.type !== 'application/json'
                && file.type !== 'application/javascript') {
                showToast('Binary files not supported. Drop a text file.');
                return false;
            }
            return true;
        }

        function handleFileDrop(file) {
            if (!isValidFile(file)) return;

            const reader = new FileReader();
            reader.onload = () => {
                elements.codeEditor.value = reader.result;
                // Auto-detect language from file extension
                elements.languageSelect.value = detectLanguage(file.name);
                // Set artifact title to filename (minus extension)
                const titleWithoutExt = file.name.replace(/\.[^/.]+$/, '');
                if (titleWithoutExt) {
                    elements.artifactTitle.value = titleWithoutExt;
                }
                // Clear active artifact reference — drop replaces content
                state.activeArtifactId = null;
                updatePreview();
            };
            reader.onerror = () => {
                showToast('Error reading file. Try again.');
            };
            reader.readAsText(file);
        }

        // Drag enter/leave counter prevents flicker when dragging over child elements
        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                dropOverlay.classList.add('active');
            }
        });

        document.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) {
                dropOverlay.classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault(); // Required to allow drop
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');

            // Guard: only handle file drops, not dragged text/images from the browser
            if (!e.dataTransfer.types.includes('Files')) return;

            const files = e.dataTransfer.files;
            if (files.length === 0) return;

            // Take the first file only; ignore the rest
            handleFileDrop(files[0]);
        });

        // Initialize
        loadState();
        updateSavedListUI(); // Load sidebar list
        initUI();
        console.log("State loaded:", state);

    </script>
</body>
</html>
