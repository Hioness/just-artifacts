<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Artifacts</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better aesthetics in dark mode */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #404040;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #737373;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        /* Drag and drop — overlay on code panel */
        #drop-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #drop-overlay.active {
            opacity: 1;
        }
        /* Toast notification */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #toast.visible {
            opacity: 1;
        }
        /* Confirm dialog */
        #confirm-overlay {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #confirm-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #confirm-dialog {
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }
        #confirm-overlay.active #confirm-dialog {
            transform: scale(1);
        }
        #language-select {
            color-scheme: dark;
        }
        #language-select option {
            background: #404040;
            color: #e5e5e5;
        }
    </style>
</head>
<body class="bg-neutral-950 h-screen flex flex-col overflow-hidden font-sans text-neutral-100">

    <!-- Header — Artifact Toolbar -->
    <header class="bg-neutral-950 border-b border-neutral-900 h-14 flex items-center justify-between px-5 shrink-0 z-20 relative">
        <!-- Left group: identity + content name -->
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-neutral-100">just artifacts</h1>
            <div class="relative group flex items-center">
                <input type="text" id="artifact-title" value="New_Artifact" class="text-sm font-medium text-neutral-200 border-b border-neutral-700 hover:border-neutral-500 focus:border-white focus:outline-none px-1 py-1 bg-transparent w-48 transition-colors" />
                <span id="unsaved-indicator" class="ml-2 text-[10px] text-amber-400 font-medium opacity-0 transition-opacity whitespace-nowrap pointer-events-none">● unsaved</span>
            </div>
        </div>

        <!-- Right group: actions -->
        <div class="flex items-center gap-3">
            <button id="save-btn" class="px-3 py-1.5 bg-white hover:bg-neutral-200 text-black text-xs font-semibold rounded transition-colors shadow-sm" title="Save (Ctrl+S)">
                Save
            </button>
            <button id="new-artifact-btn" class="px-3 py-1.5 bg-neutral-700 hover:bg-neutral-600 text-neutral-200 text-xs font-semibold rounded transition-colors flex items-center gap-1.5" title="New Artifact (Ctrl+N)">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex overflow-hidden">

        <!-- Icon Rail — always visible, no animation needed. The core anti-jank strategy. -->
        <nav id="icon-rail" class="w-12 bg-neutral-950 border-r border-neutral-900 flex flex-col items-center py-3 gap-2 shrink-0 z-30" aria-label="Sidebar navigation">
            <button id="rail-toggle-btn" class="p-1.5 hover:bg-neutral-700 rounded text-neutral-400 hover:text-neutral-100 transition-colors" title="Saved Artifacts (Ctrl+B)" aria-label="Toggle saved artifacts sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </nav>

        <!-- Sidebar Panel — flex item, width animation. Pushes content, no overlay. -->
        <aside id="sidebar" class="bg-neutral-950 border-r border-neutral-900 flex flex-col overflow-hidden shrink-0 z-20" style="width: 0; transition: width 250ms ease-out; will-change: width;">
            <!-- Inner wrapper: fixed 256px content inside the animated container -->
            <div class="w-64 flex flex-col flex-1 min-w-64">
                <div class="p-4 border-b border-neutral-900 bg-neutral-950">
                    <h2 class="font-semibold text-neutral-200 whitespace-nowrap">Saved Artifacts</h2>
                </div>
                <div id="saved-list" class="flex-1 overflow-y-auto p-2 space-y-1">
                    <!-- Saved items injected here -->
                </div>
            </div>
        </aside>

        <!-- No overlay — sidebar pushes content, nothing is hidden -->

        <!-- Content wrapper: code + preview panels share the remaining space -->
        <div class="flex-1 flex overflow-hidden min-w-0">
            <!-- Code Panel (Left, proportional) -->
            <div id="code-panel" class="h-full flex flex-col border-r border-neutral-900 bg-neutral-950 relative" style="width: 35%; min-width: 200px;">
                <!-- Editor Controls Bar -->
                <div class="h-9 bg-neutral-950 border-b border-neutral-900 flex items-center gap-2 px-3 shrink-0">
                    <select id="language-select" class="text-xs border border-neutral-600 rounded px-2 py-1 bg-neutral-700 focus:outline-none focus:border-white text-neutral-200" title="Language">
                        <option value="html">HTML</option>
                        <option value="react">React</option>
                    </select>
                    <button id="text-wrap-btn" class="px-2 py-1 hover:bg-neutral-700 rounded text-xs text-neutral-400 transition-colors" title="Toggle Text Wrap">
                        Wrap: On
                    </button>
                </div>
                <textarea id="code-editor" class="w-full flex-1 p-4 font-mono text-sm resize-none focus:outline-none bg-neutral-950 text-neutral-300 placeholder-neutral-600" spellcheck="false" placeholder="// Paste code or drag & drop a file..."></textarea>
                <!-- Drop overlay for drag-and-drop -->
                <div id="drop-overlay" class="absolute inset-0 z-20 flex items-center justify-center bg-neutral-950/95 border-2 border-dashed border-green-500/50 m-2">
                    <div class="text-center">
                        <svg class="mx-auto mb-2" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p class="text-green-400 text-sm font-medium">Drop file to load</p>
                        <p class="text-neutral-500 text-xs mt-1">.html .jsx .tsx .css .js .txt</p>
                    </div>
                </div>
            </div>

            <!-- Preview Panel (Right, takes remaining space) -->
            <div class="flex-1 h-full flex flex-col bg-neutral-950 min-w-0">
                <!-- Iframe Container -->
                <div class="flex-1 flex items-center justify-center p-8 overflow-hidden bg-neutral-950">
                    <div id="preview-wrapper" class="w-full h-full bg-neutral-800 shadow-2xl transition-all duration-300 relative">
                        <div id="preview-placeholder" class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 text-neutral-500 text-sm">
                            Preview Area
                        </div>
                        <iframe id="preview-frame" class="w-full h-full border-0 relative z-10 bg-neutral-800" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
                    </div>
                </div>

                <!-- Device Presets Bar -->
                <div class="h-12 bg-neutral-950 border-t border-neutral-900 flex items-center justify-center gap-2 px-4 shrink-0">
                    <span class="text-xs text-neutral-400 font-medium mr-2">VIEWPORT:</span>
                    <button class="device-btn px-3 py-1 text-xs font-medium rounded hover:bg-neutral-700 text-neutral-400 border border-transparent hover:border-neutral-600 transition-colors" data-width="375px">Mobile (375px)</button>
                    <button class="device-btn px-3 py-1 text-xs font-medium rounded hover:bg-neutral-700 text-neutral-400 border border-transparent hover:border-neutral-600 transition-colors" data-width="768px">Tablet (768px)</button>
                    <button class="device-btn px-3 py-1 text-xs font-medium rounded hover:bg-neutral-700 text-neutral-400 border border-transparent hover:border-neutral-600 transition-colors" data-width="1024px">Desktop (1024px)</button>
                    <button class="device-btn px-3 py-1 text-xs font-medium rounded bg-neutral-700 text-neutral-200 border border-neutral-600" data-width="100%">Full Width</button>
                    <div class="h-4 w-px bg-neutral-600 mx-2"></div>
                    <input type="number" id="custom-width" placeholder="Width (px)" class="w-24 px-2 py-1 text-xs border border-neutral-600 rounded bg-neutral-700 text-neutral-200 focus:outline-none focus:border-white placeholder-neutral-500">
                    <div class="h-4 w-px bg-neutral-600 mx-2"></div>
                    <button id="fullscreen-btn" class="px-2 py-1 hover:bg-neutral-700 rounded text-xs text-neutral-400 transition-colors" title="Fullscreen Preview">
                        Fullscreen
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Fullscreen Modal -->
    <div id="fullscreen-modal" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="absolute top-4 right-4 z-50 flex items-center gap-3 opacity-0 hover:opacity-100 transition-opacity duration-300">
            <span class="text-neutral-400 text-xs bg-black/80 px-2 py-1 rounded shadow">Press ESC to exit</span>
            <button id="close-fullscreen-btn" class="text-neutral-400 hover:text-white p-2 bg-black/80 rounded shadow transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="flex-1 bg-black relative w-full h-full"> 
             <iframe id="fullscreen-frame" class="w-full h-full border-0 bg-neutral-800" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <!-- Toast notification for drag-and-drop feedback -->
    <div id="toast"></div>

    <!-- Confirm dialog -->
    <div id="confirm-overlay" class="fixed inset-0 flex items-center justify-center bg-black/60" style="z-index:110;">
        <div id="confirm-dialog" class="bg-neutral-900 border border-neutral-700 rounded-xl p-6 w-80 shadow-2xl">
            <p id="confirm-message" class="text-sm text-neutral-200 mb-5 leading-relaxed"></p>
            <div class="flex justify-end gap-3">
                <button id="confirm-cancel-btn" class="px-4 py-2 text-xs font-medium text-neutral-400 hover:text-neutral-200 bg-neutral-800 hover:bg-neutral-700 rounded-lg transition-colors">Cancel</button>
                <button id="confirm-ok-btn" class="px-4 py-2 text-xs font-semibold text-white bg-red-600 hover:bg-red-500 rounded-lg transition-colors"><span id="confirm-ok-text">Delete</span></button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Constants & Configuration
         */
        const STORAGE_KEY = 'just-artifacts-data';
        const DEFAULT_TITLE = 'New_Artifact';

        /**
         * State Management
         */
        const state = {
            artifacts: [],
            activeArtifactId: null,

            // Computed property for easy access
            get activeArtifact() {
                return this.artifacts.find(a => a.id === this.activeArtifactId) || null;
            }
        };

        /**
         * LocalStorage Helpers
         */
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    state.artifacts = parsed.artifacts || [];
                    state.activeArtifactId = parsed.activeArtifactId || null;
                }
            } catch (e) {
                console.error("Failed to load state from localStorage:", e);
            }
        }

        function saveState() {
            try {
                const data = {
                    artifacts: state.artifacts,
                    activeArtifactId: state.activeArtifactId
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    alert("Storage full! Please delete some artifacts to save new ones.");
                } else {
                    console.error("Failed to save state:", e);
                }
            }
        }

        /**
         * Artifact Operations
         */
        function createArtifactId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createNewArtifact() {
            return {
                id: createArtifactId(),
                title: DEFAULT_TITLE,
                code: '',
                language: 'html',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
        }

        function saveCurrentArtifact(code, language, title) {
            let artifact = state.activeArtifact;
            const now = new Date().toISOString();

            if (!artifact) {
                // If no active artifact, create one
                artifact = createNewArtifact();
                state.artifacts.push(artifact);
                state.activeArtifactId = artifact.id;
            }

            artifact.code = code;
            artifact.language = language;
            artifact.title = title;
            artifact.updatedAt = now;

            saveState();
            return artifact;
        }

        function deleteArtifact(id) {
            state.artifacts = state.artifacts.filter(a => a.id !== id);
            if (state.activeArtifactId === id) {
                state.activeArtifactId = null;
            }
            saveState();
        }

        function setActiveArtifact(id) {
            state.activeArtifactId = id;
            saveState(); // Persist the active selection
        }

        /**
         * Unsaved Changes Detection
         */
        function hasUnsavedChanges() {
            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;
            const title = elements.artifactTitle.value.trim();

            // No active artifact — unsaved if there's any content at all
            if (!state.activeArtifactId) {
                return code.length > 0;
            }

            const artifact = state.activeArtifact;
            // Active ID points to a deleted artifact — content is unsaved
            if (!artifact) {
                return code.length > 0;
            }

            // Compare current editor state with the saved version
            return code !== artifact.code ||
                   language !== artifact.language ||
                   title !== artifact.title;
        }

        function updateUnsavedIndicator() {
            if (hasUnsavedChanges()) {
                elements.unsavedIndicator.style.opacity = '1';
            } else {
                elements.unsavedIndicator.style.opacity = '0';
            }
        }

        /**
         * DOM Elements
         */
        const elements = {
            newArtifactBtn: document.getElementById('new-artifact-btn'),
            codeEditor: document.getElementById('code-editor'),
            previewFrame: document.getElementById('preview-frame'),
            languageSelect: document.getElementById('language-select'),
            textWrapBtn: document.getElementById('text-wrap-btn'),
            artifactTitle: document.getElementById('artifact-title'),
            saveBtn: document.getElementById('save-btn'),
            unsavedIndicator: document.getElementById('unsaved-indicator'),
            sidebar: document.getElementById('sidebar'),
            savedList: document.getElementById('saved-list'),
            railToggleBtn: document.getElementById('rail-toggle-btn'),
            previewWrapper: document.getElementById('preview-wrapper'),
            deviceButtons: document.querySelectorAll('.device-btn'),
            customWidthInput: document.getElementById('custom-width'),
            fullscreenBtn: document.getElementById('fullscreen-btn'),
            fullscreenModal: document.getElementById('fullscreen-modal'),
            fullscreenFrame: document.getElementById('fullscreen-frame'),
            closeFullscreenBtn: document.getElementById('close-fullscreen-btn'),
            confirmOverlay: document.getElementById('confirm-overlay'),
            confirmMessage: document.getElementById('confirm-message'),
            confirmCancelBtn: document.getElementById('confirm-cancel-btn'),
            confirmOkBtn: document.getElementById('confirm-ok-btn'),
            confirmOkText: document.getElementById('confirm-ok-text'),
        };

        let confirmCallback = null;

        function showConfirmDialog(message, onConfirm, okText = 'Delete') {
            confirmCallback = onConfirm;
            elements.confirmMessage.textContent = message;
            elements.confirmOkText.textContent = okText;
            elements.confirmOverlay.classList.add('active');
            elements.confirmCancelBtn.focus();
        }

        function hideConfirmDialog() {
            elements.confirmOverlay.classList.remove('active');
            confirmCallback = null;
        }

        elements.confirmCancelBtn.addEventListener('click', hideConfirmDialog);

        elements.confirmOkBtn.addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
                confirmCallback = null;
            }
            hideConfirmDialog();
        });

        elements.confirmOverlay.addEventListener('click', (e) => {
            if (e.target === elements.confirmOverlay) {
                hideConfirmDialog();
            }
        });

        /**
         * Rendering Logic
         */
        function getHTMLContent(code) {
            return code;
        }

        function getReactContent(code) {
            return `<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    ${code}

    // Auto-render logic
    try {
        const rootElement = document.getElementById('root');
        if (typeof App !== 'undefined') {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        } else {
            // If user didn't define App, maybe they just wrote JSX or something else?
            // We'll leave it to them, or we could try to render whatever they return.
            // For now, assume App component.
        }
    } catch (e) {
        console.error("React render error:", e);
        document.body.innerHTML += '<pre style="color:red; padding:1rem;">' + e.message + '</pre>';
    }
  <\/script>
</body>
</html>`;
        }

        function updatePreview() {
            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;
            const hasCode = code.trim().length > 0;
            const wrapper = elements.previewWrapper;
            const frame = elements.previewFrame;
            const placeholder = document.getElementById('preview-placeholder');

            // Toggle background: dark gray when empty, white when there's code
            if (hasCode) {
                wrapper.classList.remove('bg-neutral-800');
                wrapper.classList.add('bg-white');
                frame.classList.remove('bg-neutral-800');
                frame.classList.add('bg-white');
                placeholder.style.display = 'none';
            } else {
                wrapper.classList.remove('bg-white');
                wrapper.classList.add('bg-neutral-800');
                frame.classList.remove('bg-white');
                frame.classList.add('bg-neutral-800');
                placeholder.style.display = '';
            }

            let content = '';

            if (language === 'react') {
                content = getReactContent(code);
            } else {
                content = getHTMLContent(code);
            }

            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            elements.previewFrame.src = url;

            // Also update fullscreen frame if open
            if (!elements.fullscreenModal.classList.contains('hidden')) {
                elements.fullscreenFrame.src = url;
            }
        }

        // Debounce update to avoid flashing on every keystroke
        let debounceTimer;
        function debouncedUpdatePreview() {
            clearTimeout(debounceTimer);
            updateUnsavedIndicator(); // Update immediately on input
            debounceTimer = setTimeout(() => {
                updatePreview();
                // Auto-save: only update existing artifacts, don't create new ones
                if (state.activeArtifactId && state.activeArtifact) {
                    const code = elements.codeEditor.value;
                    const language = elements.languageSelect.value;
                    const title = elements.artifactTitle.value.trim();
                    if (title && title !== DEFAULT_TITLE) {
                        saveCurrentArtifact(code, language, title);
                        updateSavedListUI();
                        updateUnsavedIndicator();
                    }
                }
            }, 500); // 500ms delay
        }

        /**
         * UI Logic
         */
        function initUI() {
            // Load active artifact or reset
            if (state.activeArtifactId && state.activeArtifact) {
                loadArtifactToUI(state.activeArtifact);
            } else {
                resetUI();
            }
            updatePreview();
        }

        function loadArtifactToUI(artifact) {
            elements.codeEditor.value = artifact.code || '';
            elements.languageSelect.value = artifact.language || 'html';
            elements.artifactTitle.value = artifact.title || DEFAULT_TITLE;
            updatePreview();
            updateUnsavedIndicator();
        }

        function resetUI() {
            elements.codeEditor.value = '';
            elements.languageSelect.value = 'html';
            elements.artifactTitle.value = DEFAULT_TITLE;
            state.activeArtifactId = null; // Ensure no ID is set so next save creates new
            updatePreview();
            updateUnsavedIndicator();
        }

        function toggleTextWrap() {
            if (elements.codeEditor.style.whiteSpace === 'pre') {
                elements.codeEditor.style.whiteSpace = 'pre-wrap';
                elements.textWrapBtn.textContent = 'Wrap: On';
            } else {
                elements.codeEditor.style.whiteSpace = 'pre';
                elements.textWrapBtn.textContent = 'Wrap: Off';
            }
        }

        // Initial set
        elements.codeEditor.style.whiteSpace = 'pre-wrap';

        /**
         * Event Listeners
         */
        elements.codeEditor.addEventListener('input', debouncedUpdatePreview);

        elements.artifactTitle.addEventListener('input', updateUnsavedIndicator);

        elements.languageSelect.addEventListener('change', () => {
            updatePreview();
            updateUnsavedIndicator();
        });

        elements.textWrapBtn.addEventListener('click', toggleTextWrap);

        /**
         * Device Presets & Resizing
         */
        function setPreviewWidth(width) {
            elements.previewWrapper.style.width = width;

            // Update UI state
            elements.deviceButtons.forEach(btn => {
                const btnWidth = btn.dataset.width;
                if (btnWidth === width) {
                    // Active state (Dark Mode)
                    btn.classList.add('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                    btn.classList.remove('bg-neutral-700', 'border-transparent', 'text-neutral-400', 'hover:bg-neutral-700');
                } else {
                    // Inactive state (Dark Mode)
                    btn.classList.remove('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                    btn.classList.add('bg-neutral-700', 'border-transparent', 'text-neutral-400', 'hover:bg-neutral-700');
                    if (width === '100%' && btn.dataset.width === '100%') {
                         // Full Width match
                         btn.classList.add('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                         btn.classList.remove('bg-neutral-700', 'border-transparent', 'text-neutral-400', 'hover:bg-neutral-700');
                    }
                }
            });
        }

        elements.deviceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const width = btn.dataset.width;
                setPreviewWidth(width);
                elements.customWidthInput.value = ''; // Clear custom input
            });
        });

        elements.customWidthInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val) {
                setPreviewWidth(val + 'px');
                // Deselect buttons logic handled in setPreviewWidth if matched, but here we likely want to clear active classes
                 elements.deviceButtons.forEach(btn => {
                    btn.classList.remove('bg-neutral-600', 'border-neutral-500', 'text-neutral-100');
                    btn.classList.add('bg-neutral-700', 'border-transparent', 'text-neutral-400');
                });
            }
        });

        /**
         * Fullscreen Logic
         */
        function openFullscreen() {
            elements.fullscreenModal.classList.remove('hidden');
            // Ensure content is synced
            const currentLang = elements.languageSelect.value;
            const code = elements.codeEditor.value;
            const hasCode = code.trim().length > 0;
            const frame = elements.fullscreenFrame;

            // Toggle background to match preview state
            if (hasCode) {
                frame.classList.remove('bg-neutral-800');
                frame.classList.add('bg-white');
            } else {
                frame.classList.remove('bg-white');
                frame.classList.add('bg-neutral-800');
            }

            const content = currentLang === 'react' ? getReactContent(code) : getHTMLContent(code);
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            elements.fullscreenFrame.src = url;
        }

        function closeFullscreen() {
            elements.fullscreenModal.classList.add('hidden');
            elements.fullscreenFrame.src = ''; // clear to stop scripts
        }

        elements.fullscreenBtn.addEventListener('click', openFullscreen);
        elements.closeFullscreenBtn.addEventListener('click', closeFullscreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && elements.confirmOverlay.classList.contains('active')) {
                hideConfirmDialog();
                return;
            }
            if (e.key === 'Escape' && !elements.fullscreenModal.classList.contains('hidden')) {
                closeFullscreen();
            }
            // Ctrl+B / Cmd+B → Toggle Sidebar
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidebar(!sidebarVisible);
            }
            // Ctrl+N / Cmd+N → New Artifact
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                handleNewArtifact();
            }
            // Ctrl+S / Cmd+S → Save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                elements.saveBtn.click();
            }
        });


        /**
         * Sidebar & Saved Artifacts Logic — Option 2: Icon Rail
         * No overlay, no transform. Sidebar width animates from 0 → 256px.
         * The icon rail is always visible — no open/close jank.
         */
        let sidebarVisible = false;

        function updateSavedListUI() {
            const list = elements.savedList;
            while (list.firstChild) list.removeChild(list.firstChild);

            if (state.artifacts.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-8 text-center px-4">
                        <svg class="mb-3 opacity-30" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <p class="text-sm text-neutral-500">No saved artifacts</p>
                        <p class="text-xs text-neutral-600 mt-1">Write code, click Save, and it appears here</p>
                    </div>`;
                return;
            }

            state.artifacts.forEach(artifact => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between gap-2 p-2 hover:bg-neutral-700 rounded cursor-pointer transition-colors';
                if (state.activeArtifactId === artifact.id) {
                    item.classList.add('bg-neutral-800');
                }

                item.innerHTML = `
                    <span class="text-sm font-medium text-neutral-300 truncate flex-1 min-w-0">${artifact.title}</span>
                    <div class="flex items-center gap-0.5 shrink-0">
                        <span class="text-[10px] text-neutral-600 mr-1 hidden sm:inline">${formatRelativeTime(artifact.updatedAt)}</span>
                        <button class="item-menu-btn p-1 text-neutral-500 hover:text-red-400 rounded transition-colors" title="Delete">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>`;

                // Click to load
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.item-menu-btn')) return;
                    setActiveArtifact(artifact.id);
                    loadArtifactToUI(artifact);
                    updateSavedListUI();
                    if (window.innerWidth < 768) {
                        toggleSidebar(false);
                    }
                });

                // Delete button (hold Shift to skip confirmation)
                const menuBtn = item.querySelector('.item-menu-btn');
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const artifactId = artifact.id;
                    const doDelete = () => {
                        deleteArtifact(artifactId);
                        if (state.activeArtifactId === null) resetUI();
                        updateSavedListUI();
                    };
                    if (e.shiftKey) {
                        doDelete();
                    } else {
                        showConfirmDialog(`Delete "${artifact.title}"?`, doDelete);
                    }
                });

                list.appendChild(item);
            });
        }

        function formatRelativeTime(isoString) {
            const diff = Date.now() - new Date(isoString).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return new Date(isoString).toLocaleDateString();
        }

        function toggleSidebar(show) {
            if (show === sidebarVisible) return;
            sidebarVisible = show;

            if (show) {
                elements.sidebar.style.width = '256px';
            } else {
                elements.sidebar.style.width = '0';
            }

            // Highlight the hamburger button in the rail when sidebar is open
            if (show) {
                elements.railToggleBtn.classList.add('bg-neutral-700', 'text-neutral-200');
            } else {
                elements.railToggleBtn.classList.remove('bg-neutral-700', 'text-neutral-200');
            }
        }

        // Rail: hamburger toggles sidebar
        elements.railToggleBtn.addEventListener('click', () => toggleSidebar(!sidebarVisible));

        /**
         * New Artifact Button (Header)
         */
        function handleNewArtifact() {
            if (hasUnsavedChanges()) {
                showConfirmDialog(
                    'You have unsaved changes. Discard them and create a new artifact?',
                    () => { resetUI(); },
                    'Discard'
                );
            } else {
                resetUI();
            }
        }

        elements.newArtifactBtn.addEventListener('click', handleNewArtifact);

        /**
         * Save Logic
         */
        elements.saveBtn.addEventListener('click', () => {
            let title = elements.artifactTitle.value.trim();
            if (!title) {
                alert("Please enter a title.");
                return;
            }

            if (title === DEFAULT_TITLE) {
                // Prompt user to rename
                elements.artifactTitle.focus();
                elements.artifactTitle.select();
                return;
            }

            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;

            saveCurrentArtifact(code, language, title);
            updateSavedListUI();
            updateUnsavedIndicator();

            // Visual feedback
            const originalText = elements.saveBtn.textContent;
            elements.saveBtn.textContent = 'Saved!';
            setTimeout(() => {
                elements.saveBtn.textContent = originalText;
            }, 1000);
        });

        // Handle Enter key in title input to trigger save (optional but nice)
        elements.artifactTitle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                elements.saveBtn.click();
                elements.codeEditor.focus(); // Return focus to editor
            }
        });

        /**
         * Drag & Drop File Loading
         * -------------------------
         * Supports: .html .htm .jsx .tsx .css .js .ts .txt .json .md .xml .svg .csv
         * Rejects: binary files (images, PDFs, etc.), files > 1MB
         * Auto-detects language from extension (.jsx/.tsx → React, rest → HTML)
         * Sets editor title to filename (without extension)
         */
        const ALLOWED_EXTENSIONS = new Set([
            '.html', '.htm', '.jsx', '.tsx', '.css', '.js', '.ts',
            '.txt', '.json', '.md', '.xml', '.svg', '.csv'
        ]);
        const LANG_MAP = {
            '.jsx': 'react',
            '.tsx': 'react',
        };
        const MAX_FILE_SIZE = 1024 * 1024; // 1MB

        const dropOverlay = document.getElementById('drop-overlay');
        const toast = document.getElementById('toast');
        let dragCounter = 0;
        let toastTimer = null;

        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        function detectLanguage(filename) {
            const ext = '.' + filename.split('.').pop().toLowerCase();
            return LANG_MAP[ext] || 'html';
        }

        function isValidFile(file) {
            // Reject oversized files
            if (file.size > MAX_FILE_SIZE) {
                const mb = (file.size / 1024 / 1024).toFixed(1);
                showToast(`File too large (${mb}MB). Max 1MB.`);
                return false;
            }
            // Validate by extension if present
            if (file.name.includes('.')) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.has(ext)) {
                    showToast(`Unsupported file type: ${ext}`);
                    return false;
                }
                return true;
            }
            // No extension — check MIME type as fallback
            if (file.type && !file.type.startsWith('text/')
                && file.type !== 'application/json'
                && file.type !== 'application/javascript') {
                showToast('Binary files not supported. Drop a text file.');
                return false;
            }
            return true;
        }

        function handleFileDrop(file) {
            if (!isValidFile(file)) return;

            const reader = new FileReader();
            reader.onload = () => {
                elements.codeEditor.value = reader.result;
                // Auto-detect language from file extension
                elements.languageSelect.value = detectLanguage(file.name);
                // Set artifact title to filename (minus extension)
                const titleWithoutExt = file.name.replace(/\.[^/.]+$/, '');
                if (titleWithoutExt) {
                    elements.artifactTitle.value = titleWithoutExt;
                }
                // Clear active artifact reference — drop replaces content
                state.activeArtifactId = null;
                updatePreview();
                updateUnsavedIndicator();
            };
            reader.onerror = () => {
                showToast('Error reading file. Try again.');
            };
            reader.readAsText(file);
        }

        // Drag enter/leave counter prevents flicker when dragging over child elements
        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                dropOverlay.classList.add('active');
            }
        });

        document.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) {
                dropOverlay.classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault(); // Required to allow drop
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');

            // Guard: only handle file drops, not dragged text/images from the browser
            if (!e.dataTransfer.types.includes('Files')) return;

            const files = e.dataTransfer.files;
            if (files.length === 0) return;

            // Take the first file only; ignore the rest
            handleFileDrop(files[0]);
        });

        // Initialize
        loadState();
        updateSavedListUI(); // Load sidebar list
        initUI();
        console.log("State loaded:", state);

    </script>
</body>
</html>
