<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just Artifacts</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg?v=2">
    <meta name="theme-color" content="#1a1a1a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' blob:; style-src 'self' 'unsafe-inline'; frame-src blob:; base-uri 'self'; form-action 'self';">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #1a1a1a;
            --fg:           #ffffff;
            --muted:        #888888;
            --border:       #ffffff;
            --border-dim:   #444444;
            --pane-bg:      #111111;
            --danger:       #cc3333;
            --added-fg:     #bbf7d0;
            --bw:           1px;
            --mono:         'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            --sans:         system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--mono);
            font-size: 0.75rem;
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Scrollbar ───────────────────────────────────────────────── */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-dim); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ── Buttons ─────────────────────────────────────────────────── */
        .btn {
            background: var(--bg);
            color: var(--fg);
            border: var(--bw) solid var(--border);
            padding: 0.25rem 0.6rem;
            font-family: var(--mono);
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 2px 2px 0 var(--border);
            outline: none;
        }
        .btn:hover {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--border);
            background: var(--fg);
            color: var(--bg);
        }
        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        .btn:focus-visible {
            outline: 2px dashed var(--fg);
            outline-offset: 2px;
        }
        .btn-danger {
            border-color: var(--danger);
            color: var(--danger);
            box-shadow: 2px 2px 0 var(--danger);
        }
        .btn-danger:hover {
            background: var(--danger);
            color: var(--fg);
            box-shadow: 1px 1px 0 var(--danger);
        }
        .btn-active {
            background: var(--fg);
            color: var(--bg);
        }
        .btn-group {
            display: inline-flex;
            border: var(--bw) solid var(--border);
            box-shadow: 2px 2px 0 var(--border);
        }
        .btn-group .btn {
            box-shadow: none;
            border: none;
            padding: 0.2rem 0.5rem;
            font-size: 0.7rem;
        }
        .btn-group .btn:not(:last-child) {
            border-right: var(--bw) solid var(--border);
        }

        .btn-toggle {
            background: var(--bg);
            color: var(--muted);
            border: var(--bw) solid var(--border-dim);
            padding: 0.2rem 0.5rem;
            font-family: var(--mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            outline: none;
        }
        .btn-toggle:hover {
            background: var(--pane-bg);
            color: var(--fg);
            border-color: var(--border);
        }
        .btn-toggle:focus-visible {
            outline: 2px dashed var(--fg);
            outline-offset: 2px;
        }

        /* ── Inputs ──────────────────────────────────────────────────── */
        input, select, textarea {
            font-family: var(--mono);
            background: var(--bg);
            color: var(--fg);
            border: var(--bw) solid var(--border-dim);
            padding: 0.25rem 0.5rem;
            font-size: 0.75rem;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--border);
        }
        select option {
            background: var(--bg);
            color: var(--fg);
        }

        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* ── Header ──────────────────────────────────────────────────── */
        header {
            border-bottom: var(--bw) solid var(--border);
            padding: 0.6rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--bg);
            z-index: 20;
        }
        .header-title {
            font-size: 1rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        /* ── Main Layout ─────────────────────────────────────────────── */
        main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Icon Rail ─────────────────────────────────────────────── */
        #icon-rail {
            width: 48px;
            border-right: var(--bw) solid var(--border-dim);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.5rem 0;
            gap: 0.5rem;
            flex-shrink: 0;
            background: var(--bg);
            z-index: 30;
        }
        .rail-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--muted);
            border: var(--bw) solid transparent;
            cursor: pointer;
            transition: all 0.1s ease;
            padding: 0;
        }
        .rail-btn:hover {
            color: var(--fg);
            border-color: var(--border-dim);
        }
        .rail-btn.active {
            background: var(--pane-bg);
            color: var(--fg);
            border-color: var(--border);
        }

        /* ── Sidebar ─────────────────────────────────────────────────── */
        #sidebar {
            background: var(--bg);
            border-right: var(--bw) solid var(--border-dim);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 20;
            width: 0;
            transition: width 0.25s ease-out;
            will-change: width;
        }
        .sidebar-inner {
            width: 256px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 256px;
        }
        .sidebar-header {
            padding: 0.6rem 0.75rem;
            border-bottom: var(--bw) solid var(--border-dim);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.75rem;
            background: var(--bg);
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.1s ease;
            border: var(--bw) solid transparent;
        }
        .sidebar-item:hover {
            background: var(--pane-bg);
            border-color: var(--border-dim);
        }
        .sidebar-item.active {
            background: var(--pane-bg);
            border-color: var(--border);
        }
        .sidebar-item-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--fg);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .sidebar-item-meta {
            font-size: 0.65rem;
            color: var(--muted);
            margin-right: 0.5rem;
            text-transform: uppercase;
        }
        .sidebar-item-del {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            padding: 0.15rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.1s ease;
        }
        .sidebar-item-del:hover {
            color: var(--danger);
        }

        /* ── Content Wrapper ─────────────────────────────────────────── */
        .content-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-width: 0;
        }

        /* ── Pane ────────────────────────────────────────────────────── */
        .pane {
            border: var(--bw) solid var(--border);
            background: var(--pane-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .pane-header {
            border-bottom: var(--bw) solid var(--border-dim);
            padding: 0.35rem 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            flex-shrink: 0;
        }
        .pane-header-meta {
            font-size: 0.7rem;
            color: var(--muted);
            font-weight: normal;
            text-transform: none;
        }
        .pane-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ── Code Panel ──────────────────────────────────────────────── */
        #code-panel {
            width: 35%;
            min-width: 200px;
            border-right: var(--bw) solid var(--border-dim);
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }
        #code-editor {
            width: 100%;
            height: 100%;
            padding: 1rem;
            font-family: var(--mono);
            font-size: 0.85rem;
            line-height: 1.6;
            resize: none;
            background: var(--pane-bg);
            color: var(--fg);
            border: none;
            border-bottom: var(--bw) solid var(--border-dim);
            outline: none;
            white-space: pre-wrap;
        }
        #code-editor::placeholder {
            color: var(--border-dim);
        }

        /* ── Preview Panel ───────────────────────────────────────────── */
        #preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-width: 0;
        }
        #preview-wrapper {
            width: 100%;
            height: 100%;
            background: var(--pane-bg);
            transition: width 0.3s ease;
            position: relative;
        }
        #preview-wrapper.preview-bg-filled {
            background: #ffffff;
        }
        #preview-wrapper.preview-bg-empty {
            background: var(--pane-bg);
        }
        #preview-frame {
            width: 100%;
            height: 100%;
            border: 0;
            position: relative;
            z-index: 10;
        }
        #preview-frame.preview-bg-filled {
            background: #ffffff;
        }
        #preview-frame.preview-bg-empty {
            background: var(--pane-bg);
        }
        #preview-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 0;
            color: var(--muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ── Device Bar ──────────────────────────────────────────────── */
        .device-bar {
            border-top: var(--bw) solid var(--border-dim);
            padding: 0.5rem 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            flex-shrink: 0;
            background: var(--bg);
        }
        .device-bar-label {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-right: 0.5rem;
        }

        /* ── Overlays ────────────────────────────────────────────────── */
        #drop-overlay {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(17, 17, 17, 0.95);
            border: 2px dashed var(--added-fg);
            margin: 0.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #drop-overlay.active {
            opacity: 1;
        }
        #drop-overlay-text {
            color: var(--added-fg);
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            font-family: var(--mono);
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg);
            border: var(--bw) solid var(--border);
            color: var(--fg);
            padding: 0.6rem 1.2rem;
            font-size: 0.75rem;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            text-transform: uppercase;
            box-shadow: 2px 2px 0 var(--border);
            font-family: var(--mono);
        }
        #toast.visible {
            opacity: 1;
        }

        #confirm-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 110;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }
        #confirm-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        #confirm-dialog {
            background: var(--bg);
            border: var(--bw) solid var(--border);
            padding: 1.5rem;
            width: 320px;
            box-shadow: 4px 4px 0 var(--border);
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }
        #confirm-overlay.active #confirm-dialog {
            transform: scale(1);
        }
        #confirm-message {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            color: var(--fg);
            font-family: var(--mono);
        }

        #fullscreen-modal {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 50;
            display: none;
            flex-direction: column;
        }
        #fullscreen-modal:not(.hidden) {
            display: flex;
        }
        .fullscreen-controls {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .fullscreen-controls:hover {
            opacity: 1;
        }
        .fullscreen-hint {
            font-size: 0.65rem;
            color: var(--muted);
            text-transform: uppercase;
            background: rgba(26, 26, 26, 0.9);
            padding: 0.25rem 0.5rem;
            border: var(--bw) solid var(--border-dim);
            font-family: var(--mono);
        }
        #fullscreen-frame {
            flex: 1;
            border: 0;
        }

        .hidden {
            display: none !important;
        }

        /* ── Empty States ────────────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            color: var(--muted);
            gap: 0.75rem;
        }
        .empty-state-icon {
            opacity: 0.3;
        }
        .empty-state-text {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-family: var(--mono);
        }
        .empty-state-sub {
            font-size: 0.65rem;
            color: var(--border-dim);
            text-transform: uppercase;
            font-family: var(--mono);
        }
    </style>
</head>
<body>

    <!-- Header — Artifact Toolbar -->
    <header>
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <h1 class="header-title">Just Artifacts</h1>
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="text" id="artifact-title" value="New_Artifact" style="width: 180px; background: transparent; border: var(--bw) solid var(--border-dim); padding: 0.25rem 0.5rem; font-size: 0.75rem; color: var(--fg); text-transform: uppercase; font-weight: bold;" />
                <span id="unsaved-indicator" style="font-size: 0.65rem; color: var(--fg); opacity: 0; transition: opacity 0.2s; font-weight: 900; white-space: nowrap; pointer-events: none;">● UNSAVED</span>
            </div>
        </div>

        <div style="display: flex; align-items: center; gap: 0.75rem;">
            <button id="save-btn" class="btn" title="Save (Ctrl+S)">Save</button>
            <button id="new-artifact-btn" class="btn" title="New Artifact (Ctrl+N)">
                <span style="display: flex; align-items: center; gap: 0.5rem;">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New
                </span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main>

        <!-- Icon Rail -->
        <nav id="icon-rail" aria-label="Sidebar navigation">
            <button id="rail-toggle-btn" class="rail-btn" title="Saved Artifacts (Ctrl+B)" aria-label="Toggle saved artifacts sidebar">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
        </nav>

        <!-- Sidebar Panel -->
        <aside id="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-header">
                    Saved Artifacts
                </div>
                <div id="saved-list" class="sidebar-list">
                    <!-- Saved items injected here -->
                </div>
            </div>
        </aside>

        <!-- Content wrapper: code + preview panels -->
        <div class="content-wrapper">
            <!-- Code Panel -->
            <div id="code-panel">
                <div class="pane-header">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="hidden" id="language-select" value="html" />
                        <span style="font-size: 0.7rem; text-transform: uppercase; font-weight: bold; color: var(--fg);">HTML</span>
                        <button id="text-wrap-btn" class="btn-toggle" title="Toggle Text Wrap">Wrap: On</button>
                    </div>
                </div>
                <div class="pane-body">
                    <textarea id="code-editor" spellcheck="false" placeholder="// Paste code or drag & drop a file..."></textarea>
                    <!-- Drop overlay -->
                    <div id="drop-overlay">
                        <div id="drop-overlay-text">
                            <svg style="display: block; margin: 0 auto 0.5rem;" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--added-fg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Drop file to load
                            <div style="font-size: 0.65rem; color: var(--muted); margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em;">.html .css .js .txt</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview Panel -->
            <div id="preview-panel">
                <div class="pane-body" style="padding: 1rem; display: flex; align-items: center; justify-content: center;">
                    <div id="preview-wrapper" class="preview-bg-empty">
                        <div id="preview-placeholder">Preview Area</div>
                        <iframe id="preview-frame" class="preview-bg-empty" sandbox="allow-scripts allow-forms" referrerpolicy="no-referrer"></iframe>
                    </div>
                </div>

                <!-- Device Presets Bar -->
                <div class="device-bar">
                    <span class="device-bar-label">Viewport:</span>
                    <button class="device-btn btn" data-width="375px">Mobile (375px)</button>
                    <button class="device-btn btn" data-width="768px">Tablet (768px)</button>
                    <button class="device-btn btn" data-width="1024px">Desktop (1024px)</button>
                    <button class="device-btn btn btn-active" data-width="100%">Full Width</button>
                    <div style="width: 1px; height: 1rem; background: var(--border-dim); margin: 0 0.5rem;"></div>
                    <input type="number" id="custom-width" placeholder="Width (px)" style="width: 100px; font-size: 0.7rem; padding: 0.2rem 0.5rem;">
                    <div style="width: 1px; height: 1rem; background: var(--border-dim); margin: 0 0.5rem;"></div>
                    <button id="fullscreen-btn" class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.7rem;">Fullscreen</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Fullscreen Modal -->
    <div id="fullscreen-modal" class="hidden">
        <div class="fullscreen-controls">
            <span class="fullscreen-hint">Press ESC to exit</span>
            <button id="close-fullscreen-btn" class="btn" style="padding: 0.25rem;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <iframe id="fullscreen-frame" sandbox="allow-scripts allow-forms" referrerpolicy="no-referrer"></iframe>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Confirm Dialog -->
    <div id="confirm-overlay">
        <div id="confirm-dialog">
            <p id="confirm-message"></p>
            <div style="display: flex; justify-content: flex-end; gap: 0.75rem;">
                <button id="confirm-cancel-btn" class="btn" style="border-color: var(--border-dim); color: var(--muted);">Cancel</button>
                <button id="confirm-ok-btn" class="btn btn-danger"><span id="confirm-ok-text">Delete</span></button>
            </div>
        </div>
    </div>

    <script>
        /**
         * Constants & Configuration
         */
        const STORAGE_KEY = 'just-artifacts-data';
        const DEFAULT_TITLE = 'New_Artifact';
        let previewBlobUrl = null;
        let fullscreenBlobUrl = null;

        /**
         * State Management
         */
        const state = {
            artifacts: [],
            activeArtifactId: null,

            // Computed property for easy access
            get activeArtifact() {
                return this.artifacts.find(a => a.id === this.activeArtifactId) || null;
            }
        };

        /**
         * LocalStorage Helpers
         */
        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const parsed = JSON.parse(raw);
                    state.artifacts = (parsed.artifacts || []).map(a => ({
                        ...a,
                        language: a.language === 'react' ? 'html' : (a.language || 'html')
                    }));
                    state.activeArtifactId = parsed.activeArtifactId || null;
                }
            } catch (e) {
                console.error("Failed to load state from localStorage:", e);
            }
        }

        function saveState() {
            try {
                const data = {
                    artifacts: state.artifacts,
                    activeArtifactId: state.activeArtifactId
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {
                if (e.name === 'QuotaExceededError') {
                    showToast("Storage full! Delete some artifacts to save new ones.", 5000);
                } else {
                    console.error("Failed to save state:", e);
                }
            }
        }

        /**
         * Artifact Operations
         */
        function createArtifactId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function createNewArtifact() {
            return {
                id: createArtifactId(),
                title: DEFAULT_TITLE,
                code: '',
                language: 'html',
                createdAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            };
        }

        function saveCurrentArtifact(code, language, title) {
            let artifact = state.activeArtifact;
            const now = new Date().toISOString();

            if (!artifact) {
                // If no active artifact, create one
                artifact = createNewArtifact();
                state.artifacts.push(artifact);
                state.activeArtifactId = artifact.id;
            }

            artifact.code = code;
            artifact.language = language;
            artifact.title = title;
            artifact.updatedAt = now;

            saveState();
            return artifact;
        }

        function deleteArtifact(id) {
            state.artifacts = state.artifacts.filter(a => a.id !== id);
            if (state.activeArtifactId === id) {
                state.activeArtifactId = null;
            }
            saveState();
        }

        function setActiveArtifact(id) {
            state.activeArtifactId = id;
            saveState(); // Persist the active selection
        }

        /**
         * Unsaved Changes Detection
         */
        function hasUnsavedChanges() {
            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;
            const title = elements.artifactTitle.value.trim();

            // No active artifact — unsaved if there's any content at all
            if (!state.activeArtifactId) {
                return code.length > 0;
            }

            const artifact = state.activeArtifact;
            // Active ID points to a deleted artifact — content is unsaved
            if (!artifact) {
                return code.length > 0;
            }

            // Compare current editor state with the saved version
            return code !== artifact.code ||
                   language !== artifact.language ||
                   title !== artifact.title;
        }

        function updateUnsavedIndicator() {
            if (hasUnsavedChanges()) {
                elements.unsavedIndicator.style.opacity = '1';
            } else {
                elements.unsavedIndicator.style.opacity = '0';
            }
        }

        /**
         * DOM Elements
         */
        const elements = {
            newArtifactBtn: document.getElementById('new-artifact-btn'),
            codeEditor: document.getElementById('code-editor'),
            previewFrame: document.getElementById('preview-frame'),
            languageSelect: document.getElementById('language-select'),
            textWrapBtn: document.getElementById('text-wrap-btn'),
            artifactTitle: document.getElementById('artifact-title'),
            saveBtn: document.getElementById('save-btn'),
            unsavedIndicator: document.getElementById('unsaved-indicator'),
            sidebar: document.getElementById('sidebar'),
            savedList: document.getElementById('saved-list'),
            railToggleBtn: document.getElementById('rail-toggle-btn'),
            previewWrapper: document.getElementById('preview-wrapper'),
            deviceButtons: document.querySelectorAll('.device-btn'),
            customWidthInput: document.getElementById('custom-width'),
            fullscreenBtn: document.getElementById('fullscreen-btn'),
            fullscreenModal: document.getElementById('fullscreen-modal'),
            fullscreenFrame: document.getElementById('fullscreen-frame'),
            closeFullscreenBtn: document.getElementById('close-fullscreen-btn'),
            confirmOverlay: document.getElementById('confirm-overlay'),
            confirmMessage: document.getElementById('confirm-message'),
            confirmCancelBtn: document.getElementById('confirm-cancel-btn'),
            confirmOkBtn: document.getElementById('confirm-ok-btn'),
            confirmOkText: document.getElementById('confirm-ok-text'),
        };

        let confirmCallback = null;

        function showConfirmDialog(message, onConfirm, okText = 'Delete') {
            confirmCallback = onConfirm;
            elements.confirmMessage.textContent = message;
            elements.confirmOkText.textContent = okText;
            elements.confirmOverlay.classList.add('active');
            elements.confirmCancelBtn.focus();
        }

        function hideConfirmDialog() {
            elements.confirmOverlay.classList.remove('active');
            confirmCallback = null;
        }

        elements.confirmCancelBtn.addEventListener('click', hideConfirmDialog);

        elements.confirmOkBtn.addEventListener('click', () => {
            if (confirmCallback) {
                confirmCallback();
                confirmCallback = null;
            }
            hideConfirmDialog();
        });

        elements.confirmOverlay.addEventListener('click', (e) => {
            if (e.target === elements.confirmOverlay) {
                hideConfirmDialog();
            }
        });

        /**
         * Rendering Logic
         */
        function getHTMLContent(code) {
            return code;
        }

        function updatePreview() {
            const code = elements.codeEditor.value;
            const hasCode = code.trim().length > 0;
            const wrapper = elements.previewWrapper;
            const frame = elements.previewFrame;
            const placeholder = document.getElementById('preview-placeholder');

            // Toggle background: dark gray when empty, white when there's code
            if (hasCode) {
                wrapper.classList.remove('preview-bg-empty');
                wrapper.classList.add('preview-bg-filled');
                frame.classList.remove('preview-bg-empty');
                frame.classList.add('preview-bg-filled');
                placeholder.style.display = 'none';
            } else {
                wrapper.classList.remove('preview-bg-filled');
                wrapper.classList.add('preview-bg-empty');
                frame.classList.remove('preview-bg-filled');
                frame.classList.add('preview-bg-empty');
                placeholder.style.display = '';
            }

            const content = getHTMLContent(code);

            if (previewBlobUrl) URL.revokeObjectURL(previewBlobUrl);
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            previewBlobUrl = url;

            elements.previewFrame.src = url;

            // Also update fullscreen frame if open
            if (!elements.fullscreenModal.classList.contains('hidden')) {
                elements.fullscreenFrame.src = url;
            }
        }

        // Debounce update to avoid flashing on every keystroke
        let debounceTimer;
        function debouncedUpdatePreview() {
            clearTimeout(debounceTimer);
            updateUnsavedIndicator(); // Update immediately on input
            debounceTimer = setTimeout(() => {
                updatePreview();
                // Auto-save: only update existing artifacts, don't create new ones
                if (state.activeArtifactId && state.activeArtifact) {
                    const code = elements.codeEditor.value;
                    const language = elements.languageSelect.value;
                    const title = elements.artifactTitle.value.trim();
                    if (title && title !== DEFAULT_TITLE) {
                        saveCurrentArtifact(code, language, title);
                        updateSavedListUI();
                        updateUnsavedIndicator();
                    }
                }
            }, 500); // 500ms delay
        }

        /**
         * UI Logic
         */
        function initUI() {
            // Load active artifact or reset
            if (state.activeArtifactId && state.activeArtifact) {
                loadArtifactToUI(state.activeArtifact);
            } else {
                resetUI();
            }
            updatePreview();
        }

        function loadArtifactToUI(artifact) {
            elements.codeEditor.value = artifact.code || '';
            elements.languageSelect.value = 'html';
            elements.artifactTitle.value = artifact.title || DEFAULT_TITLE;
            updatePreview();
            updateUnsavedIndicator();
        }

        function resetUI() {
            elements.codeEditor.value = '';
            elements.languageSelect.value = 'html';
            elements.artifactTitle.value = DEFAULT_TITLE;
            state.activeArtifactId = null; // Ensure no ID is set so next save creates new
            updatePreview();
            updateUnsavedIndicator();
        }

        function toggleTextWrap() {
            if (elements.codeEditor.style.whiteSpace === 'pre') {
                elements.codeEditor.style.whiteSpace = 'pre-wrap';
                elements.textWrapBtn.textContent = 'Wrap: On';
            } else {
                elements.codeEditor.style.whiteSpace = 'pre';
                elements.textWrapBtn.textContent = 'Wrap: Off';
            }
        }

        // Initial set
        elements.codeEditor.style.whiteSpace = 'pre-wrap';

        /**
         * Event Listeners
         */
        elements.codeEditor.addEventListener('input', debouncedUpdatePreview);

        elements.artifactTitle.addEventListener('input', updateUnsavedIndicator);

        elements.textWrapBtn.addEventListener('click', toggleTextWrap);

        /**
         * Device Presets & Resizing
         */
        function setPreviewWidth(width) {
            elements.previewWrapper.style.width = width;

            // Update input value to show current width
            if (width === '100%') {
                elements.customWidthInput.value = '';
            } else {
                elements.customWidthInput.value = parseInt(width);
            }

            // Update UI state
            elements.deviceButtons.forEach(btn => {
                const btnWidth = btn.dataset.width;
                if (btnWidth === width) {
                    btn.classList.add('btn-active');
                } else {
                    btn.classList.remove('btn-active');
                }
            });
        }

        elements.deviceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const width = btn.dataset.width;
                setPreviewWidth(width);
            });
        });

        elements.customWidthInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val) {
                setPreviewWidth(val + 'px');
                // Deselect buttons
                elements.deviceButtons.forEach(btn => {
                    btn.classList.remove('btn-active');
                });
            }
        });

        /**
         * Fullscreen Logic
         */
        function openFullscreen() {
            elements.fullscreenModal.classList.remove('hidden');
            // Ensure content is synced
            const code = elements.codeEditor.value;
            const hasCode = code.trim().length > 0;
            const frame = elements.fullscreenFrame;

            // Toggle background to match preview state
            if (hasCode) {
                frame.classList.remove('preview-bg-empty');
                frame.classList.add('preview-bg-filled');
            } else {
                frame.classList.remove('preview-bg-filled');
                frame.classList.add('preview-bg-empty');
            }

            const content = getHTMLContent(code);
            if (fullscreenBlobUrl) URL.revokeObjectURL(fullscreenBlobUrl);
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            fullscreenBlobUrl = url;
            elements.fullscreenFrame.src = url;
        }

        function closeFullscreen() {
            elements.fullscreenModal.classList.add('hidden');
            if (fullscreenBlobUrl) {
                URL.revokeObjectURL(fullscreenBlobUrl);
                fullscreenBlobUrl = null;
            }
            elements.fullscreenFrame.src = ''; // clear to stop scripts
        }

        elements.fullscreenBtn.addEventListener('click', openFullscreen);
        elements.closeFullscreenBtn.addEventListener('click', closeFullscreen);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && elements.confirmOverlay.classList.contains('active')) {
                hideConfirmDialog();
                return;
            }
            if (e.key === 'Escape' && !elements.fullscreenModal.classList.contains('hidden')) {
                closeFullscreen();
            }
            // Ctrl+B / Cmd+B → Toggle Sidebar
            if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                e.preventDefault();
                toggleSidebar(!sidebarVisible);
            }
            // Ctrl+N / Cmd+N → New Artifact
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                handleNewArtifact();
            }
            // Ctrl+S / Cmd+S → Save
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                elements.saveBtn.click();
            }
        });

        /**
         * Sidebar & Saved Artifacts Logic
         */
        let sidebarVisible = false;

        function updateSavedListUI() {
            const list = elements.savedList;
            while (list.firstChild) list.removeChild(list.firstChild);

            if (state.artifacts.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-state-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        <p class="empty-state-text">No saved artifacts</p>
                        <p class="empty-state-sub">Write code, click Save, and it appears here</p>
                    </div>`;
                return;
            }

            state.artifacts.forEach(artifact => {
                const item = document.createElement('div');
                item.className = 'sidebar-item';
                if (state.activeArtifactId === artifact.id) {
                    item.classList.add('active');
                }

                const titleSpan = document.createElement('span');
                titleSpan.className = 'sidebar-item-title';
                titleSpan.textContent = artifact.title;

                const metaSpan = document.createElement('span');
                metaSpan.className = 'sidebar-item-meta';
                metaSpan.textContent = formatRelativeTime(artifact.updatedAt);

                const delBtn = document.createElement('button');
                delBtn.className = 'sidebar-item-del';
                delBtn.title = 'Delete';
                delBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

                const btnContainer = document.createElement('div');
                btnContainer.style.cssText = 'display: flex; align-items: center; gap: 0.25rem; flex-shrink: 0;';
                btnContainer.appendChild(metaSpan);
                btnContainer.appendChild(delBtn);

                item.appendChild(titleSpan);
                item.appendChild(btnContainer);

                // Click to load
                item.addEventListener('click', (e) => {
                    if (e.target.closest('.sidebar-item-del')) return;
                    setActiveArtifact(artifact.id);
                    loadArtifactToUI(artifact);
                    updateSavedListUI();
                    if (window.innerWidth < 768) {
                        toggleSidebar(false);
                    }
                });

                // Delete button (hold Shift to skip confirmation)
                const menuBtn = item.querySelector('.sidebar-item-del');
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const artifactId = artifact.id;
                    const doDelete = () => {
                        deleteArtifact(artifactId);
                        if (state.activeArtifactId === null) resetUI();
                        updateSavedListUI();
                    };
                    if (e.shiftKey) {
                        doDelete();
                    } else {
                        showConfirmDialog(`Delete "${artifact.title}"?`, doDelete);
                    }
                });

                list.appendChild(item);
            });
        }

        function formatRelativeTime(isoString) {
            const diff = Date.now() - new Date(isoString).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            if (days < 7) return `${days}d ago`;
            return new Date(isoString).toLocaleDateString();
        }

        function toggleSidebar(show) {
            if (show === sidebarVisible) return;
            sidebarVisible = show;

            if (show) {
                elements.sidebar.style.width = '256px';
            } else {
                elements.sidebar.style.width = '0';
            }

            // Highlight the hamburger button in the rail when sidebar is open
            if (show) {
                elements.railToggleBtn.classList.add('active');
            } else {
                elements.railToggleBtn.classList.remove('active');
            }
        }

        // Rail: hamburger toggles sidebar
        elements.railToggleBtn.addEventListener('click', () => toggleSidebar(!sidebarVisible));

        /**
         * New Artifact Button (Header)
         */
        function handleNewArtifact() {
            if (hasUnsavedChanges()) {
                showConfirmDialog(
                    'You have unsaved changes. Discard them and create a new artifact?',
                    () => { resetUI(); },
                    'Discard'
                );
            } else {
                resetUI();
            }
        }

        elements.newArtifactBtn.addEventListener('click', handleNewArtifact);

        /**
         * Save Logic
         */
        elements.saveBtn.addEventListener('click', () => {
            let title = elements.artifactTitle.value.trim();
            if (!title) {
                showToast("Please enter a title.", 3000);
                return;
            }

            if (title === DEFAULT_TITLE) {
                // Prompt user to rename
                elements.artifactTitle.focus();
                elements.artifactTitle.select();
                return;
            }

            const code = elements.codeEditor.value;
            const language = elements.languageSelect.value;

            saveCurrentArtifact(code, language, title);
            updateSavedListUI();
            updateUnsavedIndicator();

            // Visual feedback
            const originalText = elements.saveBtn.textContent;
            elements.saveBtn.textContent = 'Saved!';
            setTimeout(() => {
                elements.saveBtn.textContent = originalText;
            }, 1000);
        });

        // Handle Enter key in title input to trigger save (optional but nice)
        elements.artifactTitle.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                elements.saveBtn.click();
                elements.codeEditor.focus(); // Return focus to editor
            }
        });

        /**
         * Drag & Drop File Loading
         */
        const ALLOWED_EXTENSIONS = new Set([
            '.html', '.htm', '.css', '.js', '.ts',
            '.txt', '.json', '.md', '.xml', '.svg', '.csv'
        ]);
        const MAX_FILE_SIZE = 1024 * 1024; // 1MB

        const dropOverlay = document.getElementById('drop-overlay');
        const toast = document.getElementById('toast');
        let dragCounter = 0;
        let toastTimer = null;

        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('visible');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('visible');
            }, duration);
        }

        function isValidFile(file) {
            // Reject oversized files
            if (file.size > MAX_FILE_SIZE) {
                const mb = (file.size / 1024 / 1024).toFixed(1);
                showToast(`File too large (${mb}MB). Max 1MB.`);
                return false;
            }
            // Validate by extension if present
            if (file.name.includes('.')) {
                const ext = '.' + file.name.split('.').pop().toLowerCase();
                if (!ALLOWED_EXTENSIONS.has(ext)) {
                    showToast(`Unsupported file type: ${ext}`);
                    return false;
                }
                return true;
            }
            // No extension — check MIME type as fallback
            if (file.type && !file.type.startsWith('text/')
                && file.type !== 'application/json'
                && file.type !== 'application/javascript') {
                showToast('Binary files not supported. Drop a text file.');
                return false;
            }
            return true;
        }

        function handleFileDrop(file) {
            if (!isValidFile(file)) return;

            const reader = new FileReader();
            reader.onload = () => {
                elements.codeEditor.value = reader.result;
                // Set artifact title to filename (minus extension)
                const titleWithoutExt = file.name.replace(/\.[^/.]+$/, '');
                if (titleWithoutExt) {
                    elements.artifactTitle.value = titleWithoutExt;
                }
                // Clear active artifact reference — drop replaces content
                state.activeArtifactId = null;
                updatePreview();
                updateUnsavedIndicator();
            };
            reader.onerror = () => {
                showToast('Error reading file. Try again.');
            };
            reader.readAsText(file);
        }

        // Drag enter/leave counter prevents flicker when dragging over child elements
        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                dropOverlay.classList.add('active');
            }
        });

        document.addEventListener('dragleave', (e) => {
            dragCounter--;
            if (dragCounter === 0) {
                dropOverlay.classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault(); // Required to allow drop
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            dropOverlay.classList.remove('active');

            // Guard: only handle file drops, not dragged text/images from the browser
            if (!e.dataTransfer.types.includes('Files')) return;

            const files = e.dataTransfer.files;
            if (files.length === 0) return;

            // Take the first file only; ignore the rest
            handleFileDrop(files[0]);
        });

        // Initialize
        loadState();
        updateSavedListUI(); // Load sidebar list
        initUI();
        setPreviewWidth('100%'); // Sync width input with default state
    </script>
</body>
</html>
